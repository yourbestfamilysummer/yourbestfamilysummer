function UpcomingList({ eventsByDate, removeEvent }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const sevenDaysOut = new Date(today); sevenDaysOut.setDate(today.getDate() + 7);
  const upcoming = [];
  Object.keys(eventsByDate).sort().forEach(dateStr => {
    const d = parseDate(dateStr); if (!d || d < today || d > sevenDaysOut) return;
    eventsByDate[dateStr].forEach(e => upcoming.push({ ...e, date: dateStr }));
  });
  if (upcoming.length === 0) {
    return (

function RespItem({ resp, memberColor, onBump, onRemove }) {
  const freq = FREQUENCIES.find(f => f.id === resp.frequency) || FREQUENCIES[0];
  const thisWeek = (resp.log || []).filter(d => weekKey(d) === weekKey(new Date())).length;

  // For cadence-tracked items, show this-week progress vs target
  let progressLabel = `×${resp.completions || 0}`;
  let weeklyBar = null;
  if (freq.perWeek && freq.id !== 'once') {
    const target = freq.perWeek;
    const pct = Math.min(100, Math.round((thisWeek / target) * 100));
    progressLabel = `${thisWeek}/${Math.ceil(target)} this wk`;
    weeklyBar = (
      <div style={{ height: 4, background: `${C.ink}10`, borderRadius: 999,
        overflow: 'hidden', marginTop: 4 }}>
        <div style={{ width: `${pct}%`, height: '100%', background: memberColor }} />
      </div>
    );
  } else if (freq.id === 'once') {
    progressLabel = (resp.completions || 0) >= 1 ? '✓ done' : 'one time';
  }

  return (
    <li style={{ background: C.paper, padding: '8px 10px', borderRadius: 10, fontSize: 14 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <div style={{ flex: 1, minWidth: 0 }}>

            <span>· {progressLabel}</span>

        <MiniBtn onClick={() => onBump(1)} color={memberColor} filled>+</MiniBtn>

  );
}

// PHOTOS
// ═══════════════════════════════════════════════════════════════════
function PhotoSection({ photos, addPhoto, updateCaption, removePhoto, isDemoMode }) {
  const fileRef = useRef(null);
  const [urls, setUrls] = useState({}); // photoId -> signed URL for display
  const [uploading, setUploading] = useState(false);

  // Resize a file in the browser and return a new File object
  const resizeFile = (file) => new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (ev) => {
      img.onload = () => {
        const maxDim = 1600;
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          const scale = maxDim / Math.max(width, height);
          width = Math.round(width * scale);
          height = Math.round(height * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => {
          const resized = new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), { type: 'image/jpeg' });
          resolve(resized);
        }, 'image/jpeg', 0.85);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  const handleFiles = async (files) => {
    setUploading(true);
    for (const file of Array.from(files)) {
      if (!file.type.startsWith('image/')) continue;
      try {
        const resized = await resizeFile(file);
        await addPhoto(resized, '');
      } catch (e) {
        console.error('Photo handling failed:', e);
      }
    }
    setUploading(false);
  };

  // Fetch signed URLs for any photos that don't have one yet
  useEffect(() => {
    const fetchUrls = async () => {
      const next = { ...urls };
      let changed = false;
      for (const p of photos) {
        if (next[p.id]) continue;
        if (p.dataUrl) { next[p.id] = p.dataUrl; changed = true; continue; }
        if (!p.path) continue;
        try {
          const { data, error } = await sb.storage.from('family-photos')
            .createSignedUrl(p.path, 3600);
          if (!error && data?.signedUrl) { next[p.id] = data.signedUrl; changed = true; }
        } catch (e) { /* skip */ }
      }
      if (changed) setUrls(next);
    };
    if (!isDemoMode && photos.length) fetchUrls();
    else if (isDemoMode) {
      // Demo mode: dataUrl is the URL
      const next = {};
      photos.forEach(p => { if (p.dataUrl) next[p.id] = p.dataUrl; });
      setUrls(next);
    }
  }, [photos, isDemoMode]);

  return (
    <div className="soh-scribble-card" style={{ marginBottom: 56 }}>
      <input ref={fileRef} type="file" accept="image/*" multiple style={{ display: 'none' }}
        onChange={e => { handleFiles(e.target.files); e.target.value = ''; }} />
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        gap: 10, flexWrap: 'wrap', marginBottom: 16 }}>
        <p style={{ margin: 0, fontSize: 14, opacity: 0.75, fontWeight: 500 }}>
          Capture summer moments. These can be added to your photo book or summary story.
        </p>
        <button className="soh-pill-btn" onClick={() => fileRef.current?.click()}
          disabled={uploading}
          style={{ background: C.orange, color: 'white', opacity: uploading ? 0.6 : 1 }}>
          <IconPlus size={16} /> {uploading ? 'Uploading…' : 'Upload photos'}
        </button>
      </div>
      {photos.length === 0 ? (
        <EmptyState text="No photos yet. Upload some to bring your summer story to life." />
      ) : (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(160px, 1fr))', gap: 12 }}>
          {photos.map(p => (
            <div key={p.id} style={{ background: C.cream, borderRadius: 12, padding: 8, position: 'relative' }}>
              <div style={{ position: 'relative', paddingTop: '100%',
                background: C.paper, borderRadius: 8, overflow: 'hidden', marginBottom: 6 }}>
                {urls[p.id] ? (
                  <img src={urls[p.id]} alt={p.caption || 'photo'} style={{
                    position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover'
                  }} />
                ) : (
                  <div style={{ position: 'absolute', inset: 0, display: 'flex',
                    alignItems: 'center', justifyContent: 'center', fontSize: 12, opacity: 0.5 }}>
                    Loading…
                  </div>
                )}
                <button onClick={() => removePhoto(p.id)} style={{
                  position: 'absolute', top: 6, right: 6,
                  background: 'rgba(0,0,0,0.6)', color: 'white',
                  border: 'none', borderRadius: '50%', width: 24, height: 24,
                  cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                  padding: 0,
                }}>
                  <IconX size={14} />
                </button>
              </div>
              <input value={p.caption} onChange={e => updateCaption(p.id, e.target.value)}
                placeholder="Caption..." style={{
                  width: '100%', border: 'none', background: 'transparent',
                  fontSize: 12, fontWeight: 500, color: C.ink, outline: 'none',
                  fontFamily: 'inherit',
                }} />
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// SUMMARIZE MODAL — two-step flow: reflections → theme picker → prompt
// ═══════════════════════════════════════════════════════════════════
function SummaryModal({ onClose, themeWord, themeYear, family, bucket, goals, reading,
  responsibilities, events, photos }) {
  const [step, setStep] = useState('reflections'); // 'reflections' | 'theme'
  const [reflections, setReflections] = useState({}); // { memberId: { question, answer } }
  const [theme, setTheme] = useState('storybook');
  const [copied, setCopied] = useState(false);

  // Assign one question per family member, rotating through the bank
  useEffect(() => {
    const initial = {};
    family.forEach((m, i) => {
      const existing = reflections[m.id];
      initial[m.id] = existing || {
        question: REFLECTION_QUESTIONS[i % REFLECTION_QUESTIONS.length],
        answer: '',
      };
    });
    setReflections(initial);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Let users shuffle to a different question for a member
  const rerollQuestion = (memberId) => {
    const current = reflections[memberId]?.question || '';
    const currentIdx = REFLECTION_QUESTIONS.indexOf(current);
    const nextIdx = (currentIdx + 1) % REFLECTION_QUESTIONS.length;
    setReflections({
      ...reflections,
      [memberId]: { ...reflections[memberId], question: REFLECTION_QUESTIONS[nextIdx] },
    });
  };

  const updateAnswer = (memberId, answer) => {
    setReflections({
      ...reflections,
      [memberId]: { ...reflections[memberId], answer },
    });
  };

  const data = useMemo(() => buildSummaryData({ themeWord, themeYear, family, bucket, goals, reading,
    responsibilities, events, photos, reflections }), [themeWord, themeYear, family, bucket, goals, reading,
    responsibilities, events, photos, reflections]);

  const prompt = useMemo(() => buildPrompt(theme, data), [theme, data]);

  const copyPrompt = () => {
    navigator.clipboard.writeText(prompt).then(() => {
      setCopied(true); setTimeout(() => setCopied(false), 2000);
    });
  };

  // STEP 1: REFLECTIONS
  if (step === 'reflections') {
    const totalAnswered = family.filter(m => (reflections[m.id]?.answer || '').trim().length > 0).length;

    return (
      <ModalShell onClose={onClose} title="Summarize Our Summer">
        <div style={{ marginBottom: 18 }}>
          <p style={{ fontSize: 14, marginTop: 0, marginBottom: 8, opacity: 0.85 }}>
            Before we tell the story, let's hear from everyone. <strong>One question per person</strong> —
            answer together as a family, or pass the laptop around.
          </p>
          <p style={{ fontSize: 12, opacity: 0.65, margin: 0, fontStyle: 'italic' }}>
            Skip any you want. The AI will use what you share to make the story come alive.
          </p>
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 20 }}>
          {family.map(m => {
            const r = reflections[m.id] || { question: '', answer: '' };
            return (
              <div key={m.id} style={{
                background: C.paper, border: `2px solid ${m.color}`,
                borderRadius: 14, padding: 14, position: 'relative', paddingTop: 22,
              }}>
                <div style={{
                  position: 'absolute', top: -10, left: 14,
                  background: m.color, color: 'white',
                  padding: '3px 12px', borderRadius: '6px 6px 4px 4px',
                  fontSize: 11, fontWeight: 700, letterSpacing: '0.08em',
                  textTransform: 'uppercase',
                  display: 'inline-flex', alignItems: 'center', gap: 5,
                }}>
                  <span style={{ fontSize: 13 }}>{m.emoji}</span> {m.name}
                </div>

                <div style={{ display: 'flex', alignItems: 'flex-start', gap: 8, marginBottom: 8 }}>
                  <div style={{
                    fontFamily: '"Tutti Frutti", "Fraunces", serif',
                    fontSize: 15, fontWeight: 700, lineHeight: 1.4, flex: 1, color: C.ink,
                  }}>
                    {r.question}
                  </div>
                  <button onClick={() => rerollQuestion(m.id)} title="Try a different question"
                    style={{
                      background: 'transparent', border: 'none', cursor: 'pointer',
                      fontSize: 14, color: C.inkSoft, padding: '2px 6px', flexShrink: 0,
                      fontFamily: 'inherit',
                    }}>
                    🎲
                  </button>
                </div>

                <textarea
                  value={r.answer}
                  onChange={e => updateAnswer(m.id, e.target.value)}
                  placeholder={`${m.name}'s answer...`}
                  rows={2}
                  style={{
                    width: '100%', border: `1.5px solid ${C.ink}15`,
                    background: C.cream, padding: 10, borderRadius: 10,
                    fontSize: 13, fontFamily: 'inherit', color: C.ink,
                    resize: 'vertical', outline: 'none', lineHeight: 1.5,
                    boxSizing: 'border-box',
                  }}
                  onFocus={e => e.target.style.borderColor = m.color}
                  onBlur={e => e.target.style.borderColor = `${C.ink}15`}
                />
              </div>
            );
          })}
        </div>

        <div style={{
          background: C.cream, borderRadius: 10, padding: '10px 14px',
          fontSize: 12, opacity: 0.75, marginBottom: 14, textAlign: 'center',
        }}>
          {totalAnswered} of {family.length} answered · 🎲 reroll to swap questions
        </div>

        <div style={{ display: 'flex', justifyContent: 'space-between', gap: 10 }}>
          <button onClick={onClose} style={{
            background: 'transparent', border: 'none', cursor: 'pointer',
            color: C.inkSoft, fontWeight: 600, fontFamily: 'inherit', fontSize: 14,
          }}>Cancel</button>
          <button className="soh-pill-btn" onClick={() => setStep('theme')} style={{
            background: C.coral, color: 'white', fontSize: 14,
          }}>
            Continue to story themes →
          </button>
        </div>
      </ModalShell>
    );
  }

  // STEP 2: THEME PICKER + PROMPT
  return (
    <ModalShell onClose={onClose} title="Summarize Our Summer">
      <div style={{ marginBottom: 14, display: 'flex', alignItems: 'center', gap: 8 }}>
        <button onClick={() => setStep('reflections')} style={{
          background: 'transparent', border: 'none', cursor: 'pointer',
          color: C.coral, fontWeight: 700, fontFamily: 'inherit', fontSize: 13,
        }}>← Back to reflections</button>
      </div>
      <p style={{ fontSize: 14, marginTop: 0, opacity: 0.8 }}>
        Pick a style, then copy the prompt and paste it into Claude or ChatGPT. The AI will write
        your family's summer story using all the details from your dashboard — including your reflections.
      </p>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))',
        gap: 10, marginBottom: 20 }}>
        {SUMMARY_THEMES.map(t => (
          <button key={t.id} onClick={() => setTheme(t.id)} style={{
            background: theme === t.id ? C.coral : C.cream,
            color: theme === t.id ? 'white' : C.ink,
            border: 'none', borderRadius: 12, padding: 12, textAlign: 'left',
            cursor: 'pointer', fontFamily: 'inherit',
          }}>
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 2 }}>{t.label}</div>
            <div style={{ fontSize: 11, opacity: theme === t.id ? 0.9 : 0.7 }}>{t.desc}</div>
          </button>
        ))}
      </div>

      <div style={{ background: C.cream, borderRadius: 12, padding: 14, marginBottom: 14 }}>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em',
          textTransform: 'uppercase', opacity: 0.6, marginBottom: 8 }}>Your prompt</div>
        <textarea readOnly value={prompt} rows={10} style={{
          width: '100%', border: 'none', background: C.paper,
          padding: 12, borderRadius: 8, fontSize: 12, fontFamily: 'ui-monospace, monospace',
          color: C.ink, resize: 'vertical', outline: 'none', lineHeight: 1.5,
        }} />
      </div>

      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
        <button className="soh-pill-btn" onClick={copyPrompt} style={{
          background: copied ? C.sage : C.coral, color: 'white', fontSize: 14,
        }}>
          <IconCopy size={14} /> {copied ? 'Copied!' : 'Copy prompt'}
        </button>
        <a href="https://claude.ai" target="_blank" rel="noreferrer" className="soh-pill-btn" style={{
          background: C.cream, color: C.ink, fontSize: 14, textDecoration: 'none',
        }}>
          Open Claude →
        </a>
        <a href="https://chat.openai.com" target="_blank" rel="noreferrer" className="soh-pill-btn" style={{
          background: C.cream, color: C.ink, fontSize: 14, textDecoration: 'none',
        }}>
          Open ChatGPT →
        </a>
      </div>
    </ModalShell>
  );
}

function buildSummaryData({ themeWord, themeYear, family, bucket, goals, reading, responsibilities, events, photos, reflections }) {
  return {
    themeWord, themeYear,
    members: family.map(m => {
      const r = (reflections || {})[m.id] || {};
      return {
        name: m.name, emoji: m.emoji, mindset: m.mindset || '(none set)',
        reflectionQuestion: r.question || null,
        reflectionAnswer: (r.answer || '').trim() || null,
        books: reading.filter(r => r.memberId === m.id && r.done).map(r => r.title),
        goalsCompleted: goals.filter(g => g.memberId === m.id && g.progress >= g.target).map(g => g.title),
        goalsInProgress: goals.filter(g => g.memberId === m.id && g.progress < g.target).map(g => `${g.title} (${g.progress}/${g.target})`),
        responsibilities: responsibilities.filter(c => c.memberId === m.id).map(c => `${c.text} (×${c.completions})`),
      };
    }),
    bucketDone: bucket.filter(b => b.done).map(b => b.text),
    bucketRemaining: bucket.filter(b => !b.done).map(b => b.text),
    events: events.map(e => {
      const who = e.memberId === 'family' ? 'family' : (family.find(f => f.id === e.memberId)?.name || 'someone');
      return `${prettyDate(e.date)}: ${e.title} (${who})`;
    }),
    photoCount: photos.length,
    photoCaptions: photos.map(p => p.caption).filter(Boolean),
  };
}

function buildPrompt(themeId, data) {
  const stats = formatDataBlock(data);
  const themePrompts = {
    storybook: `Write our family's "Summer of ${data.themeWord}" as a warm, magical short story. Use a "once upon a summer..." narrative voice. Weave each family member's journey together — let their reflections shape who they are in the story. Highlight the meaningful moments and small victories. Aim for ~600 words.`,
    timecapsule: `Write a letter from our family to our future selves — to be opened next summer, exactly 1 year from now. Capture what mattered this Summer of ${data.themeWord} ${data.themeYear}: who we were, what we learned, what we hoped for. Use each person's reflections to give the letter their genuine voice. Warm, reflective, honest. ~400 words.`,
    adventure: `Write our Summer of ${data.themeWord} as an explorer's adventure log with dated entries. Each entry should be short and evocative, like a journal kept on a great expedition. Use the family's reflections to add personal emotional beats throughout. Include 6-10 entries spanning the summer.`,
    newspaper: `Write a newspaper feature article headlined "Local Family Has Best Summer Ever" (or your own better headline). Use a friendly journalistic style. Use each family member's reflection as a real quote attributed to them. Include a subhead and a short closing kicker.`,
    rhyming: `Write a long, bouncy rhyming story about our Summer of ${data.themeWord}. Use simple, playful, sing-song rhymes (AABB or ABAB) that are genuinely fun to read aloud — the kind that makes a kid say "aw, did it end already?!" Include each family member by name with their own moment in the story. Use their reflections to inspire what each person does. Build a real arc — opening, adventures, a small bump or surprise, and a warm ending. TARGET LENGTH: 300-400 WORDS (not characters — that's roughly 50-70 lines of verse). Keep the rhythm consistent and the energy high.`,
    superhero: `Write our Summer of ${data.themeWord} as a superhero saga in comic-book style. Give each family member a unique superpower drawn from their mindset and reflection — for example, someone who "let go of the inbox" might have the power to freeze time, someone "brave at swim lessons" might have water powers. Set up the family as a team facing an everyday-life challenge (boredom, the screen-time monster, the back-to-school countdown). Use dramatic action beats, sound effects (KAPOW! ZOOM!), and a triumphant team-up ending. ~500 words.`,
  };
  const ask = themePrompts[themeId] || themePrompts.storybook;
  return `${ask}

Use these details from our family's summer:

${stats}

Please make it personal, warm, and family-friendly. Use the family members' names naturally. Don't list things mechanically — weave them into the story. The reflection answers are the most important emotional material — lean on them heavily.`;
}

function formatDataBlock(d) {
  const lines = [];
  lines.push(`THEME: Summer of ${d.themeWord} ${d.themeYear}`);
  lines.push('');
  lines.push('FAMILY MEMBERS:');
  d.members.forEach(m => {
    lines.push(`- ${m.emoji} ${m.name}`);
    lines.push(`  Mindset declared at the start of summer: ${m.mindset}`);
    if (m.reflectionAnswer) {
      lines.push(`  Reflection — "${m.reflectionQuestion}"`);
      lines.push(`    ${m.name}'s answer: ${m.reflectionAnswer}`);
    }
    if (m.books.length) lines.push(`  Books finished: ${m.books.join(', ')}`);
    if (m.goalsCompleted.length) lines.push(`  Goals completed: ${m.goalsCompleted.join(', ')}`);
    if (m.goalsInProgress.length) lines.push(`  Goals in progress: ${m.goalsInProgress.join(', ')}`);
    if (m.responsibilities.length) lines.push(`  Responsibilities: ${m.responsibilities.join(', ')}`);
  });
  if (d.bucketDone.length) {
    lines.push('');
    lines.push('BUCKET LIST ADVENTURES COMPLETED:');
    d.bucketDone.forEach(b => lines.push(`- ${b}`));
  }
  if (d.bucketRemaining.length) {
    lines.push('');
    lines.push('BUCKET LIST STILL TO DO:');
    d.bucketRemaining.forEach(b => lines.push(`- ${b}`));
  }
  if (d.events.length) {
    lines.push('');
    lines.push('EVENTS & MOMENTS:');
    d.events.forEach(e => lines.push(`- ${e}`));
  }
  if (d.photoCaptions.length) {
    lines.push('');
    lines.push('PHOTO CAPTIONS:');
    d.photoCaptions.forEach(c => lines.push(`- ${c}`));
  } else if (d.photoCount > 0) {
    lines.push('');
    lines.push(`PHOTOS: ${d.photoCount} captured`);
  }
  return lines.join('\n');
}

// PHOTO BOOK MODAL — 8x8 PDF builder for Shutterfly
// ═══════════════════════════════════════════════════════════════════
function PhotoBookModal({ onClose, themeWord, themeYear, family, bucket, goals, reading, events, photos }) {
  const [generating, setGenerating] = useState(false);

  const generatePDF = async () => {
    setGenerating(true);
    try {
      // Lazy-load jsPDF from CDN
      if (!window.jspdf) {
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
          s.onload = resolve; s.onerror = reject;
          document.head.appendChild(s);
        });
      }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'in', format: [8, 8] });
      buildPhotoBookPDF(doc, { themeWord, themeYear, family, bucket, goals, reading, events, photos });
      doc.save(`Summer-of-${themeWord || 'memories'}-${themeYear}.pdf`);
    } catch (e) {
      console.error(e);
      alert('Sorry, something went wrong generating the PDF. Try again with fewer photos.');
    }
    setGenerating(false);
  };

  return (
    <ModalShell onClose={onClose} title="Make a Photo Book">
      <p style={{ fontSize: 14, marginTop: 0, opacity: 0.8, marginBottom: 16 }}>
        Generate a print-ready <strong>8×8 inch PDF</strong> with all your summer highlights —
        designed to upload as a custom photo book at Shutterfly (or any photo book service that accepts PDFs).
      </p>

      <div style={{ background: C.cream, borderRadius: 12, padding: 16, marginBottom: 16 }}>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em',
          textTransform: 'uppercase', opacity: 0.6, marginBottom: 8 }}>What's included</div>
        <ul style={{ margin: 0, padding: '0 0 0 20px', fontSize: 13, lineHeight: 1.7 }}>
          <li>Cover page with your Summer of {themeWord || '___'} theme</li>
          <li>Family member pages with their mindset & accomplishments</li>
          <li>Photo pages (one photo per page with caption)</li>
          <li>Bucket list highlights</li>
          <li>A closing "summer in numbers" page</li>
        </ul>
      </div>

      <div style={{ background: `${C.dustyblue}20`, borderRadius: 12, padding: 14, marginBottom: 18,
        fontSize: 13, lineHeight: 1.6 }}>
        <strong>📘 How to use with Shutterfly:</strong>
        <ol style={{ margin: '6px 0 0', paddingLeft: 20 }}>
          <li>Download the PDF below</li>
          <li>Visit Shutterfly.com and start a new <em>8x8 hardcover photo book</em></li>
          <li>Choose a blank "Custom Path" layout</li>
          <li>Upload your PDF as full-page images for each spread</li>
        </ol>
      </div>

      <button className="soh-pill-btn" onClick={generatePDF} disabled={generating} style={{
        background: generating ? C.cream : C.dustyblue, color: generating ? C.ink : 'white',
        fontSize: 15, padding: '12px 24px', width: '100%',
        cursor: generating ? 'wait' : 'pointer',
      }}>
        <IconDownload size={16} />
        {generating ? 'Building your photo book…' : 'Download 8×8 PDF'}
      </button>
      <p style={{ fontSize: 11, opacity: 0.55, marginTop: 12, marginBottom: 0, textAlign: 'center' }}>
        Photos are rendered at print quality. Large photo collections may take a moment.
      </p>
    </ModalShell>
  );
}

function buildPhotoBookPDF(doc, { themeWord, themeYear, family, bucket, goals, reading, events, photos }) {
  const W = 8, H = 8;
  const M = 0.6;

  // ─── Cover ───
  doc.setFillColor(253, 243, 241); doc.rect(0, 0, W, H, 'F');
  doc.setTextColor(61, 53, 48);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(14);
  doc.text(`OUR ${themeYear}`, W/2, M + 0.4, { align: 'center' });

  doc.setFontSize(48);
  doc.text('SUMMER', W/2, H/2 - 0.5, { align: 'center' });
  doc.text('OF', W/2, H/2 + 0.2, { align: 'center' });
  doc.setTextColor(231, 111, 89);
  doc.setFontSize(56);
  doc.text((themeWord || '___').toUpperCase(), W/2, H/2 + 1.2, { align: 'center' });

  doc.setTextColor(61, 53, 48);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(11);
  const names = family.map(m => m.name).filter(Boolean).join(' · ');
  doc.text(names, W/2, H - M - 0.2, { align: 'center' });

  // ─── Family member pages ───
  family.forEach(m => {
    doc.addPage([W, H]);
    doc.setFillColor(253, 243, 241); doc.rect(0, 0, W, H, 'F');

    // Colored top bar
    const [r,g,b] = hexToRgb(m.color);
    doc.setFillColor(r, g, b); doc.rect(0, 0, W, 1.2, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold'); doc.setFontSize(28);
    doc.text(m.name || '—', M, 0.85);

    doc.setTextColor(61, 53, 48);
    doc.setFontSize(11); doc.setFont('helvetica', 'normal');
    doc.text(`Summer of ${themeWord} meant:`, M, 1.8);

    doc.setFont('helvetica', 'italic'); doc.setFontSize(13);
    const mindsetLines = doc.splitTextToSize(m.mindset || '(no mindset set)', W - 2*M);
    doc.text(mindsetLines, M, 2.2);

    let y = 2.2 + mindsetLines.length * 0.22 + 0.4;
    doc.setFont('helvetica', 'bold'); doc.setFontSize(11);
    doc.text('SUMMER HIGHLIGHTS', M, y); y += 0.3;

    doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
    const books = reading.filter(r => r.memberId === m.id && r.done);
    if (books.length) { doc.text(`📖 Books finished: ${books.map(b => b.title).join(', ')}`, M, y, { maxWidth: W - 2*M }); y += 0.4; }
    const goalsDone = goals.filter(g => g.memberId === m.id && g.progress >= g.target);
    if (goalsDone.length) { doc.text(`🎯 Goals completed: ${goalsDone.map(g => g.title).join(', ')}`, M, y, { maxWidth: W - 2*M }); y += 0.4; }
  });

  // ─── Photo pages — one photo per page with caption ───
  photos.forEach(p => {
    doc.addPage([W, H]);
    doc.setFillColor(253, 243, 241); doc.rect(0, 0, W, H, 'F');
    try {
      // Fit image into 6.4 x 6 area centered
      const imgW = 6.4, imgH = 6;
      const x = (W - imgW) / 2, y = 0.6;
      doc.addImage(p.dataUrl, 'JPEG', x, y, imgW, imgH, undefined, 'FAST');
    } catch (e) { /* skip bad images */ }

    if (p.caption) {
      doc.setTextColor(61, 53, 48); doc.setFont('helvetica', 'italic'); doc.setFontSize(12);
      const caps = doc.splitTextToSize(p.caption, W - 1.6);
      doc.text(caps, W/2, H - 0.7, { align: 'center' });
    }
  });

  // ─── Bucket list page ───
  const doneBucket = bucket.filter(b => b.done);
  if (doneBucket.length) {
    doc.addPage([W, H]);
    doc.setFillColor(253, 243, 241); doc.rect(0, 0, W, H, 'F');
    doc.setTextColor(61, 53, 48); doc.setFont('helvetica', 'bold'); doc.setFontSize(28);
    doc.text('ADVENTURES', W/2, 1.2, { align: 'center' });
    doc.setFontSize(12); doc.setFont('helvetica', 'normal');
    doc.text('Bucket list moments from our summer', W/2, 1.6, { align: 'center' });
    let y = 2.4;
    doneBucket.forEach(b => {
      doc.setFontSize(13);
      doc.text('✓  ' + b.text, M + 0.4, y, { maxWidth: W - 2*M - 0.4 });
      y += 0.45;
      if (y > H - M) return;
    });
  }

  // ─── Closing page: summer in numbers ───
  doc.addPage([W, H]);
  doc.setFillColor(253, 243, 241); doc.rect(0, 0, W, H, 'F');
  doc.setTextColor(61, 53, 48); doc.setFont('helvetica', 'bold'); doc.setFontSize(28);
  doc.text(`OUR SUMMER`, W/2, 1.2, { align: 'center' });
  doc.text(`IN NUMBERS`, W/2, 1.9, { align: 'center' });

  const totalBooks = reading.filter(r => r.done).length;
  const totalGoals = goals.filter(g => g.progress >= g.target).length;
  const totalBucket = bucket.filter(b => b.done).length;
  const totalEvents = events.length;
  const totalPhotos = photos.length;

  const stats = [
    [String(totalBooks), 'books read'],
    [String(totalGoals), 'goals achieved'],
    [String(totalBucket), 'adventures'],
    [String(totalEvents), 'memories made'],
    [String(totalPhotos), 'photos captured'],
  ];

  let sy = 2.8;
  stats.forEach(([num, label]) => {
    doc.setFont('helvetica', 'bold'); doc.setFontSize(36);
    doc.setTextColor(231, 111, 89);
    doc.text(num, W/2 - 1, sy, { align: 'right' });
    doc.setFont('helvetica', 'normal'); doc.setFontSize(13);
    doc.setTextColor(61, 53, 48);
    doc.text(label, W/2 - 0.7, sy);
    sy += 0.7;
  });
}

function hexToRgb(hex) {
  const h = hex.replace('#', '');
  return [parseInt(h.substring(0,2), 16), parseInt(h.substring(2,4), 16), parseInt(h.substring(4,6), 16)];
}

// ─── REWARD LADDER ─── shows current badge count + the next 3 milestones ahead
function RewardLadder({ rewards, totalBadgesEarned, badgesByMember, family }) {
  // Compute "next 3" upcoming rewards across all scopes, sorted by how close they are
  const upcoming = useMemo(() => {
    const all = rewards
      .filter(r => !r.claimed)
      .map(r => {
        const have = r.scope === 'family' ? totalBadgesEarned : badgesByMember(r.scope);
        return { ...r, have, remaining: Math.max(0, r.badgeCount - have),
          pct: Math.min(100, Math.round((have / Math.max(1, r.badgeCount)) * 100)),
          unlocked: have >= r.badgeCount };
      });
    // Show unlocked-but-unclaimed first (they're "ready"), then closest upcoming
    const ready = all.filter(r => r.unlocked).slice(0, 3);
    const next = all.filter(r => !r.unlocked).sort((a, b) => a.remaining - b.remaining).slice(0, 3 - ready.length);
    return [...ready, ...next];
  }, [rewards, totalBadgesEarned, family]);

  // If no rewards set, show a friendly banner pointing to the form below
  if (rewards.length === 0) {
    return (
      <div style={{
        background: `linear-gradient(135deg, ${C.butter}, ${C.cream})`,
        borderRadius: 14, padding: '14px 16px', marginBottom: 16,
        display: 'flex', alignItems: 'center', gap: 12,
      }}>
        <div style={{
          fontSize: 26, width: 44, height: 44, borderRadius: '50%',
          background: C.paper, display: 'flex', alignItems: 'center', justifyContent: 'center',
          boxShadow: `0 2px 0 ${C.coral}25`,
        }}>🏅</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 2 }}>
            <strong style={{ fontSize: 18, color: C.coral }}>{totalBadgesEarned}</strong> badges earned so far
          </div>
          <div style={{ fontSize: 12, opacity: 0.7 }}>
            Add a few rewards below to see your ladder!
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{
      background: `linear-gradient(135deg, ${C.butter}, ${C.cream})`,
      borderRadius: 14, padding: 16, marginBottom: 16,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
        <div style={{
          fontSize: 26, width: 44, height: 44, borderRadius: '50%',
          background: C.paper, display: 'flex', alignItems: 'center', justifyContent: 'center',
          boxShadow: `0 2px 0 ${C.coral}25`,
        }}>🏅</div>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em',
            textTransform: 'uppercase', opacity: 0.6 }}>Badges earned</div>
          <div style={{ fontFamily: '"Tutti Frutti", "Fraunces", serif',
            fontSize: 24, fontWeight: 800, color: C.coral, lineHeight: 1 }}>
            {totalBadgesEarned}
          </div>
        </div>
      </div>

      {upcoming.length > 0 && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {upcoming.map((r, i) => {
            const scopeLabel = r.scope === 'family'
              ? '🏡'
              : (family.find(f => f.id === r.scope)?.emoji || '👤');
            return (
              <div key={r.id} style={{
                background: r.unlocked ? `${C.coral}15` : C.paper,
                borderRadius: 10, padding: '8px 12px',
                display: 'flex', alignItems: 'center', gap: 10,
                border: r.unlocked ? `1.5px solid ${C.coral}40` : `1.5px solid transparent`,
              }}>
                <span style={{ fontSize: 18 }}>
                  {r.unlocked ? '🎁' : (i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉')}
                </span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{
                    fontFamily: '"Tutti Frutti", "Fraunces", serif',
                    fontSize: 14, fontWeight: 700,
                    overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                  }}>
                    {scopeLabel} {r.title}
                  </div>
                  <div style={{ height: 6, background: C.cream, borderRadius: 999,
                    overflow: 'hidden', marginTop: 4 }}>
                    <div style={{
                      width: `${r.pct}%`, height: '100%',
                      background: r.unlocked ? C.coral : `${C.coral}aa`,
                      transition: 'width 0.4s ease',
                    }} />
                  </div>
                </div>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.ink,
                  whiteSpace: 'nowrap', minWidth: 70, textAlign: 'right' }}>
                  {r.unlocked
                    ? <span style={{ color: C.coral }}>Ready! 🎉</span>
                    : <span>{r.remaining} to go</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// FAMILY MEETING WIZARD
// 5 steps: welcome → crew → theme vote → declarations → bucket/goals
// Ends with: Family Promise celebration
// ═══════════════════════════════════════════════════════════════════
function FamilyMeeting({ existingFamily, existingBucket, existingTheme, existingEndDate, existingCountdownLabel, existingBadgePlan, isFirstTimeSetup, onComplete, onCancel }) {
  const [step, setStep] = useState(0); // 0=welcome, 1=crew, 2=theme, 3=declarations, 4=bucket+goals, 5=badge plan, 6=promise
  const [members, setMembers] = useState(existingFamily || []);
  const [themeWord, setThemeWord] = useState(existingTheme || '');
  const [bucketItems, setBucketItems] = useState(existingBucket || []);
  const [perMemberGoals, setPerMemberGoals] = useState({});
  const [perMemberBooks, setPerMemberBooks] = useState({});
  const [countdownLabel, setCountdownLabel] = useState(existingCountdownLabel || 'end of summer');
  const [endDate, setEndDate] = useState(existingEndDate || DEFAULT_END);
  const [badgePlan, setBadgePlan] = useState(existingBadgePlan || DEFAULT_BADGE_PLAN);

  const totalSteps = 6;

  const next = () => setStep(s => Math.min(6, s + 1));
  const back = () => setStep(s => Math.max(0, s - 1));

  const finish = () => {
    onComplete({
      themeWord, members, bucketItems, perMemberGoals, perMemberBooks,
      countdownLabel, endDate, badgePlan, isFirstTimeSetup,
    });
  };

  return (
    <div style={{ background: C.cream, color: C.ink, minHeight: '100vh',
      padding: '32px 16px 80px', position: 'relative', overflow: 'hidden', borderRadius: 16 }}>
      <style>{`
        .soh-input { padding: 10px 14px; border-radius: 12px; border: 2px solid ${C.ink}15;
          background: ${C.paper}; font-size: 14px; color: ${C.ink}; outline: none;
          font-family: inherit; font-weight: 500; width: 100%; box-sizing: border-box;
          transition: border-color 0.15s ease; }
        .soh-input:focus { border-color: ${C.coral}; }
        .soh-pill-btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px;
          padding: 12px 22px; border-radius: 999px; border: none; font-weight: 700; font-size: 15px;
          cursor: pointer; font-family: inherit; transition: transform 0.12s ease; }
        .soh-pill-btn:hover:not(:disabled) { transform: translateY(-1px); }
        .soh-pill-btn:disabled { opacity: 0.45; cursor: not-allowed; }
        @keyframes soh-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .soh-fade { animation: soh-fade 0.4s ease-out; }
        @keyframes soh-pop-big { 0% { transform: scale(0.3); opacity: 0; } 70% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        .soh-pop-big { animation: soh-pop-big 0.7s ease-out; }

        @media (max-width: 640px) {
          .soh-wiz-crew-form { grid-template-columns: 1fr !important; }
          .soh-wiz-crew-form > select { width: 100% !important; }
          .soh-wiz-goal-form { grid-template-columns: 1fr 80px !important; }
          .soh-wiz-goal-form > .soh-pill-btn { grid-column: span 2; }
          .soh-promise-grid { grid-template-columns: 1fr !important; }
          .soh-pill-btn { padding: 10px 18px; font-size: 14px; }
        }
      `}</style>

      <div style={{ maxWidth: 720, margin: '0 auto', position: 'relative' }}>

        {/* Top bar — progress + cancel */}
        {step > 0 && step < 6 && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 24 }}>
            <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.08em',
              textTransform: 'uppercase', opacity: 0.6, whiteSpace: 'nowrap' }}>
              Step {step} of {totalSteps}
            </div>
            <div style={{ flex: 1, height: 8, background: C.paper, borderRadius: 999, overflow: 'hidden' }}>
              <div style={{ width: `${(step / totalSteps) * 100}%`, height: '100%',
                background: C.coral, transition: 'width 0.4s ease', borderRadius: 999 }} />
            </div>
            {onCancel && (
              <button onClick={onCancel} style={{
                background: 'transparent', border: 'none', cursor: 'pointer',
                color: C.inkSoft, fontSize: 13, fontWeight: 600, fontFamily: 'inherit',
                display: 'inline-flex', alignItems: 'center', gap: 4,
              }}>
                <IconX size={14} /> exit
              </button>
            )}
          </div>
        )}

        {step === 0 && <WizardWelcome onStart={next} onCancel={onCancel} />}
        {step === 1 && <WizardCrew members={members} setMembers={setMembers} onNext={next} onBack={back} />}
        {step === 2 && <WizardTheme themeWord={themeWord} setThemeWord={setThemeWord}
          countdownLabel={countdownLabel} setCountdownLabel={setCountdownLabel}
          endDate={endDate} setEndDate={setEndDate} onNext={next} onBack={back} />}
        {step === 3 && <WizardDeclarations themeWord={themeWord} members={members}
          setMembers={setMembers} onNext={next} onBack={back} />}
        {step === 4 && <WizardBucketGoals members={members}
          bucketItems={bucketItems} setBucketItems={setBucketItems}
          perMemberGoals={perMemberGoals} setPerMemberGoals={setPerMemberGoals}
          perMemberBooks={perMemberBooks} setPerMemberBooks={setPerMemberBooks}
          onNext={next} onBack={back} />}
        {step === 5 && <WizardBadgePlan badgePlan={badgePlan} setBadgePlan={setBadgePlan}
          themeWord={themeWord} members={members} onNext={next} onBack={back} />}
        {step === 6 && <WizardPromise themeWord={themeWord} members={members}
          bucketItems={bucketItems} badgePlan={badgePlan} onLaunch={finish} onBack={back} />}
      </div>
    </div>
  );
}

        <div style={{ marginTop: 32 }}>

// ─────────────────────────── STEP 1: CREW ───────────────────────────
function WizardCrew({ members, setMembers, onNext, onBack }) {

    setMembers([...members, m]);
    setName('');
    // cycle to next color/emoji for next person

    setEmoji(EMOJI_OPTIONS[(members.length + 1) % EMOJI_OPTIONS.length]);

  const remove = (id) => setMembers(members.filter(m => m.id !== id));

  return (

      <WizardHeader title="Who's on the crew?" subtitle="Add each family member, one at a time. Pass the laptop and let everyone pick their own emoji and color." />

        <div className="soh-wiz-crew-form" style={{ display: 'grid', gridTemplateColumns: '90px 1fr auto', gap: 10, marginBottom: 14 }}>
          <select className="soh-input" value={emoji} onChange={e => setEmoji(e.target.value)}
            style={{ fontSize: 22, cursor: 'pointer' }}>
            {EMOJI_OPTIONS.map(em => <option key={em} value={em}>{em}</option>)}

          <input className="soh-input" value={name} onChange={e => setName(e.target.value)}

          <button className="soh-pill-btn" onClick={addPerson} disabled={!name.trim()}
            style={{ background: C.coral, color: 'white' }}>

            {MEMBER_COLORS.map(c => (
              <button key={c} onClick={() => setColor(c)} style={{
                width: 32, height: 32, borderRadius: '50%', background: c,
                border: `3px solid ${color === c ? C.ink : C.paper}`,
                boxShadow: `0 0 0 1px ${C.ink}15`, cursor: 'pointer', padding: 0 }} />

      {members.length > 0 && (

          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em',
            textTransform: 'uppercase', opacity: 0.6, marginBottom: 10 }}>
            Our crew so far ({members.length})
          </div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            {members.map(m => (
              <div key={m.id} style={{ display: 'inline-flex', alignItems: 'center', gap: 8,
                background: m.color, color: 'white', borderRadius: 999, padding: '6px 8px 6px 14px',
                fontWeight: 700, fontSize: 14 }}>
                <span style={{ fontSize: 18 }}>{m.emoji}</span> {m.name}
                <button onClick={() => remove(m.id)} style={{
                  background: 'rgba(255,255,255,0.3)', border: 'none', color: 'white',
                  borderRadius: '50%', width: 22, height: 22, cursor: 'pointer',
                  display: 'inline-flex', alignItems: 'center', justifyContent: 'center', padding: 0,
                }}>
                  <IconX size={12} />
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      <WizardNav onBack={onBack} onNext={onNext} nextDisabled={members.length === 0}
        nextLabel={members.length === 0 ? 'Add at least one person' : 'Looks good →'} />
    </div>
  );
}

// ─────────────────────────── STEP 2: THEME VOTE ───────────────────────────
function WizardTheme({ themeWord, setThemeWord, countdownLabel, setCountdownLabel,
  endDate, setEndDate, onNext, onBack }) {
  const [candidates, setCandidates] = useState(
    themeWord
      ? [{ id: 1, word: themeWord, votes: 0 }]
      : THEME_SUGGESTIONS.slice(0, 5).map((w, i) => ({ id: i + 1, word: w, votes: 0 }))
  );
  const [newWord, setNewWord] = useState('');
  const [revealed, setRevealed] = useState(false);

  const addWord = () => {
    if (!newWord.trim()) return;
    const exists = candidates.find(c => c.word.toLowerCase() === newWord.trim().toLowerCase());
    if (exists) { setNewWord(''); return; }
    setCandidates([...candidates, { id: Date.now(), word: newWord.trim(), votes: 0 }]);
    setNewWord('');
  };
  const vote = (id) => setCandidates(candidates.map(c => c.id === id ? { ...c, votes: c.votes + 1 } : c));
  const unvote = (id) => setCandidates(candidates.map(c => c.id === id ? { ...c, votes: Math.max(0, c.votes - 1) } : c));
  const remove = (id) => setCandidates(candidates.filter(c => c.id !== id));

  const winner = useMemo(() => {
    if (!candidates.length) return null;
    const sorted = [...candidates].sort((a, b) => b.votes - a.votes);
    if (sorted[0].votes === 0) return null;
    return sorted[0];
  }, [candidates]);

  const reveal = () => {
    if (winner) {
      setThemeWord(winner.word);
      setRevealed(true);
    }
  };

  if (revealed && winner) {
    return (
      <div className="soh-fade" style={{ textAlign: 'center', paddingTop: 20 }}>
        <WizardHeader title="And the winner is..." subtitle="" />
        <div className="soh-pop-big" style={{
          background: C.paper, borderRadius: 32, padding: '40px 32px',
          boxShadow: `0 8px 24px ${C.ink}15, 0 2px 0 ${C.ink}10`,
          margin: '20px 0 24px',
        }}>
          <OneLineRainbowTitle word={winner.word} />
        </div>
        <p style={{ fontSize: 16, opacity: 0.8, marginBottom: 24 }}>
          ✨ Your family's theme is locked in. Let's set up your countdown.
        </p>

        <div className="soh-scribble-card" style={{
          background: C.paper, borderRadius: 20, padding: 24, marginBottom: 20,
          boxShadow: `0 2px 0 ${C.ink}15, 0 8px 24px ${C.ink}08`, textAlign: 'left',
        }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em',
            textTransform: 'uppercase', opacity: 0.6, marginBottom: 10 }}>
            What are we counting down to?
          </div>
          <input className="soh-input" value={countdownLabel}
            onChange={e => setCountdownLabel(e.target.value)}
            placeholder="end of summer, vacation, first day of school..."
            style={{ marginBottom: 14 }} />
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em',
            textTransform: 'uppercase', opacity: 0.6, marginBottom: 10 }}>
            On what date?
          </div>
          <input type="date" className="soh-input" value={endDate}
            onChange={e => setEndDate(e.target.value)} />
        </div>

        <WizardNav onBack={() => setRevealed(false)} onNext={onNext} nextLabel="Continue →" />
      </div>
    );
  }

  return (
    <div className="soh-fade">
      <WizardHeader title="Vote on your theme word"
        subtitle='What one word do you want this summer to be about? Add ideas, then tap a heart to vote. The most-loved word wins.' />

      <div className="soh-scribble-card" style={{
        background: C.paper, borderRadius: 20, padding: 24, marginBottom: 20,
        boxShadow: `0 2px 0 ${C.ink}15, 0 8px 24px ${C.ink}08`,
      }}>
        <div style={{ display: 'flex', gap: 10, marginBottom: 18 }}>
          <input className="soh-input" value={newWord}
            onChange={e => setNewWord(e.target.value)}
            placeholder="Add a word to vote on..."
            onKeyDown={e => e.key === 'Enter' && addWord()} />
          <button className="soh-pill-btn" onClick={addWord}
            style={{ background: C.coral, color: 'white' }}>
            <IconPlus size={16} /> Add
          </button>
        </div>

        <ul style={{ listStyle: 'none', padding: 0, margin: 0, display: 'grid', gap: 8 }}>
          {[...candidates].sort((a, b) => b.votes - a.votes).map(c => (
            <li key={c.id} style={{ display: 'flex', alignItems: 'center', gap: 10,
              padding: '10px 14px', background: C.cream, borderRadius: 12 }}>
              <span style={{ fontFamily: '"Tutti Frutti", "Fraunces", serif', fontSize: 22, fontWeight: 700,
                flex: 1, textTransform: 'lowercase' }}>{c.word}</span>
              <button onClick={() => unvote(c.id)} disabled={c.votes === 0} style={{
                background: C.paper, border: 'none', cursor: c.votes === 0 ? 'not-allowed' : 'pointer',
                opacity: c.votes === 0 ? 0.3 : 0.6, padding: 6, fontFamily: 'inherit',
                fontWeight: 800, fontSize: 16, borderRadius: 8, width: 28, height: 28,
              }}>−</button>
              <button onClick={() => vote(c.id)} title="Vote!" style={{
                background: c.votes > 0 ? C.coral : C.paper,
                color: c.votes > 0 ? 'white' : C.coral,
                border: 'none', cursor: 'pointer', padding: '6px 12px', borderRadius: 999,
                fontFamily: 'inherit', fontWeight: 800, fontSize: 14,
                display: 'inline-flex', alignItems: 'center', gap: 4,
              }}>
                ♥ {c.votes}
              </button>
              <button onClick={() => remove(c.id)} style={{
                background: 'transparent', border: 'none', cursor: 'pointer',
                opacity: 0.4, padding: 4, color: C.ink,
              }}>
                <IconX size={14} />
              </button>
            </li>
          ))}
        </ul>
      </div>

      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
        <button className="soh-pill-btn" onClick={onBack} style={{ background: C.paper, color: C.ink }}>
          ← Back
        </button>
        <button className="soh-pill-btn" onClick={reveal} disabled={!winner}
          style={{ background: winner ? C.coral : C.cream, color: winner ? 'white' : C.inkSoft }}>
          {winner ? `Reveal the winner: ${winner.word}! →` : 'Vote for at least one word'}
        </button>
      </div>
    </div>
  );
}

// ─────────────────────── STEP 3: DECLARATIONS ───────────────────────
function WizardDeclarations({ themeWord, members, setMembers, onNext, onBack }) {
  const [activeIdx, setActiveIdx] = useState(0);
  const STARTERS = ['I choose to...', 'I will...', 'I am becoming...', "I'm letting go of...", 'I want to...'];
  const active = members[activeIdx];

  if (!active) {
    return (
      <div className="soh-fade">
        <WizardHeader title="No crew yet" subtitle="Go back and add at least one family member first." />
        <WizardNav onBack={onBack} onNext={onNext} nextDisabled />
      </div>
    );
  }

  const updateMindset = (text) => {
    setMembers(members.map((m, i) => i === activeIdx ? { ...m, mindset: text } : m));
  };

  const insertStarter = (starter) => {
    const current = active.mindset || '';
    if (current.trim() === '') {
      updateMindset(starter + ' ');
    } else if (!current.endsWith(' ')) {
      updateMindset(current + ' ' + starter + ' ');
    } else {
      updateMindset(current + starter + ' ');
    }
  };

  const allDeclared = members.every(m => (m.mindset || '').trim().length > 0);

  return (
    <div className="soh-fade">
      <WizardHeader title="What do you declare?"
        subtitle={`What does Summer of ${themeWord || '___'} mean for each of you? Take turns — speak it out loud, then type it in.`} />

      {/* Crew tabs */}
      <div style={{ display: 'flex', gap: 6, marginBottom: 16, flexWrap: 'wrap' }}>
        {members.map((m, i) => {
          const done = (m.mindset || '').trim().length > 0;
          const isActive = i === activeIdx;
          return (
            <button key={m.id} onClick={() => setActiveIdx(i)} style={{
              background: isActive ? m.color : (done ? `${m.color}30` : C.paper),
              color: isActive ? 'white' : C.ink,
              border: `2px solid ${isActive ? m.color : 'transparent'}`,
              borderRadius: 999, padding: '6px 12px',
              fontWeight: 700, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit',
              display: 'inline-flex', alignItems: 'center', gap: 6,
            }}>
              <span>{m.emoji}</span> {m.name} {done && !isActive && '✓'}
            </button>
          );
        })}
      </div>

      <div className="soh-scribble-card" style={{
        background: C.paper, borderRadius: 20, padding: 24, marginBottom: 20,
        boxShadow: `0 2px 0 ${C.ink}15, 0 8px 24px ${C.ink}08`,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
          <div style={{ width: 56, height: 56, borderRadius: '50%', background: active.color,
            display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 32 }}>
            {active.emoji}
          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em',
              textTransform: 'uppercase', opacity: 0.6 }}>It's {active.name}'s turn</div>
            <div style={{ fontFamily: '"Tutti Frutti", "Fraunces", serif', fontSize: 22, fontWeight: 700 }}>
              {active.name}, what do you declare?
            </div>
          </div>
        </div>

        <textarea className="soh-input" value={active.mindset || ''}
          onChange={e => updateMindset(e.target.value)}
          placeholder={`What does Summer of ${themeWord || '___'} mean to you?`}
          rows={4} style={{ resize: 'vertical', fontFamily: 'inherit', lineHeight: 1.5, padding: 14, fontSize: 15 }} />

        <div style={{ marginTop: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em',
            textTransform: 'uppercase', opacity: 0.55, marginBottom: 8 }}>
            Need a starter? Tap to add:
          </div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {STARTERS.map(s => (
              <button key={s} onClick={() => insertStarter(s)} style={{
                background: C.cream, border: `1.5px solid ${C.ink}15`,
                borderRadius: 999, padding: '5px 12px', fontWeight: 600, fontSize: 12,
                cursor: 'pointer', color: C.ink, fontFamily: 'inherit', fontStyle: 'italic',
              }}>{s}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Navigate within members */}
      {members.length > 1 && (
        <div style={{ display: 'flex', gap: 8, justifyContent: 'center', marginBottom: 20 }}>
          <button onClick={() => setActiveIdx(Math.max(0, activeIdx - 1))} disabled={activeIdx === 0}
            style={{ background: 'transparent', border: `1.5px solid ${C.ink}20`,
              borderRadius: 999, padding: '6px 14px', fontWeight: 600, fontSize: 13,
              cursor: activeIdx === 0 ? 'not-allowed' : 'pointer', opacity: activeIdx === 0 ? 0.4 : 1,
              fontFamily: 'inherit', color: C.ink }}>
            ← Previous person
          </button>
          <button onClick={() => setActiveIdx(Math.min(members.length - 1, activeIdx + 1))}
            disabled={activeIdx === members.length - 1}
            style={{ background: 'transparent', border: `1.5px solid ${C.ink}20`,
              borderRadius: 999, padding: '6px 14px', fontWeight: 600, fontSize: 13,
              cursor: activeIdx === members.length - 1 ? 'not-allowed' : 'pointer',
              opacity: activeIdx === members.length - 1 ? 0.4 : 1,
              fontFamily: 'inherit', color: C.ink }}>
            Next person →
          </button>
        </div>
      )}

      <WizardNav onBack={onBack} onNext={onNext} nextDisabled={!allDeclared}
        nextLabel={allDeclared ? 'Everyone declared! →' : 'Each person needs a declaration'} />
    </div>
  );
}

// ─────────────────── STEP 4: BUCKET + GOALS + BOOKS ───────────────────
function WizardBucketGoals({ members, bucketItems, setBucketItems,
  perMemberGoals, setPerMemberGoals, perMemberBooks, setPerMemberBooks, onNext, onBack }) {
  const [newBucket, setNewBucket] = useState('');
  const [activeMemberIdx, setActiveMemberIdx] = useState(0);
  const [newGoalTitle, setNewGoalTitle] = useState('');
  const [newGoalTarget, setNewGoalTarget] = useState('');
  const [newBook, setNewBook] = useState('');
  const active = members[activeMemberIdx];

  const addBucket = () => {
    if (!newBucket.trim()) return;
    setBucketItems([...bucketItems, newBucket.trim()]);
    setNewBucket('');
  };
  const removeBucket = (i) => setBucketItems(bucketItems.filter((_, idx) => idx !== i));

  const addGoal = () => {
    if (!newGoalTitle.trim() || !active) return;
    const list = perMemberGoals[active.id] || [];
    setPerMemberGoals({ ...perMemberGoals, [active.id]: [...list, {
      title: newGoalTitle.trim(), target: parseInt(newGoalTarget) || 1
    }] });
    setNewGoalTitle(''); setNewGoalTarget('');
  };
  const removeGoal = (mid, idx) => {
    const list = (perMemberGoals[mid] || []).filter((_, i) => i !== idx);
    setPerMemberGoals({ ...perMemberGoals, [mid]: list });
  };

  const addBook = () => {
    if (!newBook.trim() || !active) return;
    const list = perMemberBooks[active.id] || [];
    setPerMemberBooks({ ...perMemberBooks, [active.id]: [...list, newBook.trim()] });
    setNewBook('');
  };
  const removeBook = (mid, idx) => {
    const list = (perMemberBooks[mid] || []).filter((_, i) => i !== idx);
    setPerMemberBooks({ ...perMemberBooks, [mid]: list });
  };

  return (
    <div className="soh-fade">
      <WizardHeader title="Dream up your summer"
        subtitle="Brainstorm adventures together, then each person sets a few personal goals and books they want to read. Don't overthink it — you can always add more later." />

      {/* BUCKET LIST */}
      <div className="soh-scribble-card" style={{
        background: C.paper, borderRadius: 20, padding: 24, marginBottom: 16,
        boxShadow: `0 2px 0 ${C.ink}15, 0 8px 24px ${C.ink}08`,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
          <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            width: 32, height: 32, borderRadius: '50%', background: C.blush, color: 'white' }}>
            <IconList size={16} />
          </span>
          <h3 style={{ margin: 0, fontFamily: '"Tutti Frutti", "Fraunces", serif', fontSize: 20, fontWeight: 700 }}>
            Bucket list adventures
          </h3>
        </div>
        <p style={{ fontSize: 13, opacity: 0.7, marginTop: 0, marginBottom: 12 }}>
          What do you want to do as a family this summer? Pass the laptop — everyone calls one out.
        </p>
        <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
          <input className="soh-input" value={newBucket}
            onChange={e => setNewBucket(e.target.value)}
            placeholder="Catch fireflies, drive-in movie, beach day..."
            onKeyDown={e => e.key === 'Enter' && addBucket()} />
          <button className="soh-pill-btn" onClick={addBucket}
            style={{ background: C.coral, color: 'white' }}>
            <IconPlus size={16} />
          </button>
        </div>
        {bucketItems.length > 0 && (
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {bucketItems.map((b, i) => (
              <span key={i} style={{ display: 'inline-flex', alignItems: 'center', gap: 6,
                background: C.cream, borderRadius: 999, padding: '5px 12px',
                fontSize: 13, fontWeight: 600 }}>
                {b}
                <button onClick={() => removeBucket(i)} style={{
                  background: 'transparent', border: 'none', cursor: 'pointer',
                  opacity: 0.4, padding: 0, color: C.ink, display: 'inline-flex',
                }}>
                  <IconX size={12} />
                </button>
              </span>
            ))}
          </div>
        )}
      </div>

      {/* GOALS + BOOKS per member */}
      <div className="soh-scribble-card" style={{
        background: C.paper, borderRadius: 20, padding: 24, marginBottom: 20,
        boxShadow: `0 2px 0 ${C.ink}15, 0 8px 24px ${C.ink}08`,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>

            width: 32, height: 32, borderRadius: '50%', background: C.navy, color: 'white' }}>

                    fontSize: 13, fontWeight: 600 }}>
                    {g.title} <span style={{ opacity: 0.5 }}>({g.target})</span>
                    <button onClick={() => removeGoal(active.id, i)} style={{
                      background: 'transparent', border: 'none', cursor: 'pointer',
                      opacity: 0.4, padding: 0, color: C.ink, display: 'inline-flex',
                    }}>
                      <IconX size={12} />
                    </button>

// ─────────────────────── STEP 5: BADGE PLAN ───────────────────────
function WizardBadgePlan({ badgePlan, setBadgePlan, themeWord, members, onNext, onBack }) {
  const [activeIdx, setActiveIdx] = useState(0);
  const active = members[activeIdx];

  if (!active) {
    return (
      <div className="soh-fade">
        <WizardHeader title="No crew yet" subtitle="Go back and add at least one family member first." />
        <WizardNav onBack={onBack} onNext={onNext} nextDisabled />
      </div>
    );
  }

  const memberBadges = badgesFor(badgePlan, active.id);

  const updateBadge = (badgeKey, field, value) => {
    const current = memberBadges[badgeKey];
    let nextValue = value;
    if (field === 'target') {
      const n = parseInt(value);
      nextValue = isNaN(n) || n < 1 ? 1 : n;
    }
    setBadgePlan({
      ...badgePlan,
      perMember: {
        ...(badgePlan.perMember || {}),
        [active.id]: {
          ...memberBadges,
          [badgeKey]: { ...current, [field]: nextValue },
        },
      },
    });
  };

  const updateFamily = (key, value) => {
    const n = parseInt(value);
    setBadgePlan({ ...badgePlan, [key]: isNaN(n) || n < 1 ? 1 : n });
  };

  const copyToAll = () => {
    const allSame = {};
    members.forEach(m => { allSame[m.id] = JSON.parse(JSON.stringify(memberBadges)); });
    setBadgePlan({ ...badgePlan, perMember: allSame });
  };

  return (
    <div className="soh-fade">
      <WizardHeader title="Set each person's badge plan"
        subtitle="Every crew member sets their own goals — and how often they reset. A 6-year-old's plan looks different from a teen's. Click each name to set their badges." />

      {/* Per-member tabs */}
      <div style={{ display: 'flex', gap: 6, marginBottom: 16, flexWrap: 'wrap' }}>
        {members.map((m, i) => {
          const isActive = i === activeIdx;
          const hasCustom = !!(badgePlan.perMember && badgePlan.perMember[m.id]);
          return (
            <button key={m.id} onClick={() => setActiveIdx(i)} style={{
              background: isActive ? m.color : (hasCustom ? `${m.color}30` : C.paper),
              color: isActive ? 'white' : C.ink,
              border: `2px solid ${isActive ? m.color : 'transparent'}`,
              borderRadius: 999, padding: '6px 14px',
              fontWeight: 700, fontSize: 14, cursor: 'pointer', fontFamily: 'inherit',
              display: 'inline-flex', alignItems: 'center', gap: 6,
            }}>
              <span style={{ fontSize: 16 }}>{m.emoji}</span> {m.name} {hasCustom && !isActive && '✓'}
            </button>
          );
        })}
        {members.length > 1 && (
          <button onClick={copyToAll} title="Copy this person's settings to all crew members"
            style={{
              background: 'transparent', border: `1.5px dashed ${C.ink}30`,
              borderRadius: 999, padding: '5px 12px', fontWeight: 600, fontSize: 12,
              cursor: 'pointer', color: C.inkSoft, fontFamily: 'inherit',
            }}>
            📋 Copy {active.name}'s settings to all
          </button>
        )}
      </div>

      {/* Active member's badges */}
      <div className="soh-scribble-card" style={{
        background: C.paper, borderRadius: 20, padding: 24, marginBottom: 16,
        boxShadow: `0 2px 0 ${C.ink}15, 0 8px 24px ${C.ink}08`,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
          <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            width: 36, height: 36, borderRadius: '50%', background: active.color, color: 'white', fontSize: 20 }}>
            {active.emoji}
          </span>
          <h3 style={{ margin: 0, fontFamily: '"Tutti Frutti", "Fraunces", serif', fontSize: 22, fontWeight: 700 }}>
            {active.name}'s badge plan
          </h3>
        </div>

        <p style={{ fontSize: 13, opacity: 0.75, marginTop: 0, marginBottom: 16 }}>
          For each badge, pick a target and how often it resets. <em>Weekly</em> badges can be earned again each week. <em>All summer</em> badges are one big goal.
        </p>

        {BADGE_DEFS.map(def => (
          <BadgeRow key={def.id} def={def}
            config={memberBadges[def.id]}
            onTargetChange={v => updateBadge(def.id, 'target', v)}
            onCadenceChange={v => updateBadge(def.id, 'cadence', v)}
            memberColor={active.color} />
        ))}
      </div>

      {/* Family-wide badge — Summer Champ — shared by all */}
      <div className="soh-scribble-card" style={{
        background: C.paper, borderRadius: 20, padding: 24, marginBottom: 20,
        boxShadow: `0 2px 0 ${C.ink}15, 0 8px 24px ${C.ink}08`,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
          <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            width: 32, height: 32, borderRadius: '50%', background: C.mustard, color: 'white', fontSize: 16 }}>
            🏡
          </span>
          <h3 style={{ margin: 0, fontFamily: '"Tutti Frutti", "Fraunces", serif', fontSize: 20, fontWeight: 700 }}>
            Family-wide badge
          </h3>
        </div>
        <p style={{ fontSize: 13, opacity: 0.7, marginTop: 0, marginBottom: 8 }}>
          Earned together when the family completes bucket adventures.
        </p>
        <SimpleBadgeRow emoji="👑" name="Summer Champ"
          before="Family completes" valueLabel="bucket items" after="all summer"
          value={badgePlan.summerChampBucket} onChange={v => updateFamily('summerChampBucket', v)} />
      </div>

      <div style={{
        background: `${C.dustyblue}25`, borderRadius: 12, padding: 14, marginBottom: 20,
        fontSize: 13, lineHeight: 1.6, color: C.ink,
      }}>
        <strong>💡 How this works:</strong> Each person picks their own targets and cadences.
        A 6-year-old's reading goal might be "5 books all summer" while a teen's is "1 book per week."
        Every badge earned counts toward unlocking family rewards together.
      </div>

      <WizardNav onBack={onBack} onNext={onNext} nextLabel="Last step →" />
    </div>
  );
}

// ─────────────────────── STEP 6: FAMILY PROMISE + PRINTABLES ───────────────────────
function WizardPromise({ themeWord, members, bucketItems, badgePlan, onLaunch, onBack }) {
  const promiseRef = useRef(null);

  // Auto-generate the promise paragraph from declarations
  const promiseParagraph = useMemo(() => {
    const w = themeWord || '___';
    const named = members.filter(m => m.name && (m.mindset || '').trim()).map(m => {
      const ms = (m.mindset || '').trim();
      const cap = ms.charAt(0).toUpperCase() + ms.slice(1);
      const ended = /[.!?]$/.test(cap) ? cap : cap + '.';
      return `${m.name} declares: ${ended}`;
    });
    const declarationsText = named.length ? named.join(' ') : '';
    const bucketSummary = bucketItems.length
      ? ` Together, we'll ${bucketItems.slice(0, 3).map(b => b.toLowerCase()).join(', ')}${bucketItems.length > 3 ? ', and so much more' : ''}.`
      : '';
    return `This summer, we choose ${w.toLowerCase()}. ${declarationsText}${bucketSummary} This is our Summer of ${w}.`;
  }, [themeWord, members, bucketItems]);

  // ─── NEW: native browser print approach ───
  // Opens a fresh window with print-styled HTML and triggers print dialog.
  // Customer can "Save as PDF" from the print dialog, or print directly.
  // This is much more reliable than html2canvas — fonts, layout, everything renders correctly.
  const printPromise = () => {
    const win = window.open('', '_blank', 'width=900,height=1100');
    if (!win) {
      alert('Please allow pop-ups to print. Then try again.');
      return;
    }
    win.document.write(buildPromiseHTML({ themeWord, members, promiseParagraph }));
    win.document.close();
    // Wait for fonts to load, then print
    win.focus();
    setTimeout(() => {
      try { win.print(); } catch (e) { /* user can hit Cmd+P themselves */ }
    }, 800);
  };

  const printBadgePlan = () => {
    const win = window.open('', '_blank', 'width=900,height=1100');
    if (!win) {
      alert('Please allow pop-ups to print. Then try again.');
      return;
    }
    win.document.write(buildBadgePlanHTML({ themeWord, members, badgePlan }));
    win.document.close();
    win.focus();
    setTimeout(() => {
      try { win.print(); } catch (e) { /* user can hit Cmd+P themselves */ }
    }, 800);
  };

  return (
    <div className="soh-fade" style={{ textAlign: 'center', paddingTop: 20 }}>
      <DecorSticker style={{ top: 0, left: '10%' }} rotate={-15} size={32}><Sparkle color={C.mustard} /></DecorSticker>
      <DecorSticker style={{ top: 30, right: '12%' }} rotate={18} size={28}><Sparkle color={C.coral} /></DecorSticker>
      <DecorSticker style={{ top: 200, left: '8%' }} rotate={-8} size={20}><Dot color={C.sage} /></DecorSticker>
      <DecorSticker style={{ top: 240, right: '14%' }} rotate={10} size={24}><Dot color={C.dustyblue} /></DecorSticker>

      <div className="soh-pop-big" style={{
        display: 'inline-block', background: C.paper, borderRadius: 32,
        padding: 'clamp(24px, 5vw, 40px) clamp(20px, 5vw, 40px) 32px', boxShadow: `0 8px 24px ${C.ink}15, 0 2px 0 ${C.ink}10`,
        maxWidth: 720, width: '100%', textAlign: 'left',
      }}>
        {/* The Family Promise — on-screen preview */}
        <div ref={promiseRef} style={{
          background: C.paper, padding: 32, borderRadius: 0,
        }}>
          <PromisePrintable themeWord={themeWord} members={members}
            bucketItems={bucketItems} promiseParagraph={promiseParagraph} />
        </div>

        <div style={{ display: 'flex', gap: 8, justifyContent: 'center',
          flexWrap: 'wrap', marginTop: 20, marginBottom: 28 }}>
          <button className="soh-pill-btn" onClick={printPromise}
            style={{ background: C.dustyblue, color: 'white', fontSize: 14 }}>
            <IconDownload size={14} /> Print Family Promise
          </button>
          <button className="soh-pill-btn" onClick={printBadgePlan}
            style={{ background: C.sage, color: 'white', fontSize: 14 }}>
            <IconDownload size={14} /> Print Badge Plan
          </button>
        </div>

        <p style={{ fontSize: 11, opacity: 0.55, marginTop: -16, marginBottom: 24, textAlign: 'center' }}>
          Tip: in the print dialog, choose "Save as PDF" as your destination to keep a digital copy.
        </p>

        <div style={{ textAlign: 'center', borderTop: `2px solid ${C.cream}`, paddingTop: 24 }}>
          <p style={{ fontSize: 15, opacity: 0.8, marginBottom: 20, fontFamily: '"Tutti Frutti", "Fraunces", serif' }}>
            🎉 Your Summer of <strong>{themeWord}</strong> is officially launched!
          </p>
          <button className="soh-pill-btn" onClick={onLaunch} style={{
            background: C.coral, color: 'white', fontSize: 17, padding: '14px 28px',
            boxShadow: `0 4px 0 ${C.ink}20`,
          }}>
            <IconSparkles size={18} /> Begin the Summer →
          </button>
          <div style={{ marginTop: 10 }}>
            <button onClick={onBack} style={{
              background: 'transparent', border: 'none', cursor: 'pointer',
              color: C.inkSoft, fontSize: 13, fontWeight: 600, fontFamily: 'inherit',
            }}>← Go back and edit</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// Pull the embedded Tutti Frutti @font-face block from the parent document
// so the print window can render with the same font as the on-screen preview.
function getEmbeddedFontCSS() {
  try {
    const styleEl = document.getElementById('soh-custom-fonts');
    return styleEl ? styleEl.innerHTML : '';
  } catch (e) {
    return '';
  }
}
