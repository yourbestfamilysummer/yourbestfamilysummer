const SUMMER_START = '2026-05-26';

function parseDate(str) {
  if (!str) return null;
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function formatISO(d) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function daysBetween(a, b) {
  const ms = (b.setHours(0,0,0,0) - a.setHours(0,0,0,0));
  return Math.round(ms / 86400000);
}
function startOfWeek(d) {
  const x = new Date(d); x.setHours(0,0,0,0);
  const day = x.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  x.setDate(x.getDate() + diff);
  return x;
}
function weekKey(d) { return formatISO(startOfWeek(new Date(d))); }
function summerWeeks(startStr, endStr) {
  const s = startOfWeek(parseDate(startStr));
  const e = startOfWeek(parseDate(endStr));
  const out = [];
  let cur = new Date(s);
  while (cur <= e) { out.push(formatISO(cur)); cur.setDate(cur.getDate() + 7); }
  return out;
}
function prettyDate(iso) {
  const d = parseDate(iso); if (!d) return '';
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

// Date helpers for cadence buckets
function monthKey(dateStr) {
  // YYYY-MM-DD → YYYY-MM
  if (!dateStr) return '';
  return dateStr.slice(0, 7);
}

// Format a friendly description like "Read 1 book per week" or "Read 5 books all summer"
function badgeDescription(badgeId, target, cadence) {
  const def = BADGE_DEFS.find(b => b.id === badgeId);
  const cad = CADENCES.find(c => c.id === cadence);
  if (!def || !cad) return '';
  const unit = target === 1 ? def.unit : def.unitPlural;
  return `${target} ${unit} ${cad.label}`;
}

// ───────── BADGE PROGRESS ENGINE ─────────
// For a member + badge config, compute:
//   - currentCount: progress in the current period
//   - target: the goal
//   - earnedTotal: how many times the badge has been completed across all periods
//   - periodLabel: human-readable current period
function computeBadgeProgress(memberId, badgeId, config, ctx) {
  const today = new Date();
  const todayIso = formatISO(today);
  const target = config.target || 1;

  let currentCount = 0;
  let earnedTotal = 0;
  let periodLabel = '';

  if (config.cadence === 'summer') {
    // Whole-summer progress — count all events
    currentCount = countAcrossDays(memberId, badgeId, ctx, () => true);
    earnedTotal = currentCount >= target ? 1 : 0;
    periodLabel = 'all summer';
  } else if (config.cadence === 'weekly') {
    // Weekly: count events whose date falls in this week
    const thisWeek = weekKey(today);
    currentCount = countAcrossDays(memberId, badgeId, ctx, (date) => weekKey(date) === thisWeek);
    // Count completed weeks (any week that hit target)
    earnedTotal = countCompletedPeriods(memberId, badgeId, ctx, target, 'weekly');
    periodLabel = 'this week';
  } else if (config.cadence === 'monthly') {
    const thisMonth = monthKey(todayIso);
    currentCount = countAcrossDays(memberId, badgeId, ctx, (date) => monthKey(date) === thisMonth);
    earnedTotal = countCompletedPeriods(memberId, badgeId, ctx, target, 'monthly');
    periodLabel = 'this month';
  }

  return { currentCount, target, earnedTotal, periodLabel,
    pct: target > 0 ? Math.min(100, Math.round((currentCount / target) * 100)) : 0,
    completed: currentCount >= target };
}

// Count events (books finished, responsibilities done, goals completed) for a member
// whose event-date passes the filter
function countAcrossDays(memberId, badgeId, ctx, dateFilter) {
  if (badgeId === 'reading') {
    return ctx.reading.filter(r => r.memberId === memberId && r.done &&
      r.completedDate && dateFilter(r.completedDate)).length;
  }
  if (badgeId === 'helper') {
    return ctx.responsibilities
      .filter(c => c.memberId === memberId)
      .reduce((sum, c) => sum + (c.log || []).filter(d => dateFilter(d)).length, 0);
  }
  if (badgeId === 'goals') {
    // A goal "completes" on the day its progress hit target — approximate via last progressLog entry
    return ctx.goals.filter(g => g.memberId === memberId && g.progress >= g.target)
      .filter(g => {
        const log = g.progressLog || [];
        const lastDate = log.length ? log[log.length - 1].date : null;
        return lastDate && dateFilter(lastDate);
      }).length;
  }
  return 0;
}

// Count how many distinct periods (weeks or months) the member hit the target
function countCompletedPeriods(memberId, badgeId, ctx, target, cadence) {
  const keyFn = cadence === 'weekly' ? weekKey : monthKey;
  const dates = [];
  if (badgeId === 'reading') {
    ctx.reading.filter(r => r.memberId === memberId && r.done && r.completedDate)
      .forEach(r => dates.push(r.completedDate));
  } else if (badgeId === 'helper') {
    ctx.responsibilities.filter(c => c.memberId === memberId)
      .forEach(c => (c.log || []).forEach(d => dates.push(d)));
  } else if (badgeId === 'goals') {
    ctx.goals.filter(g => g.memberId === memberId && g.progress >= g.target)
      .forEach(g => {
        const log = g.progressLog || [];
        if (log.length) dates.push(log[log.length - 1].date);
      });
  }
  // Group by period key, count completed periods
  const periodCounts = {};
  dates.forEach(d => {
    const k = keyFn(d);
    periodCounts[k] = (periodCounts[k] || 0) + 1;
  });
  return Object.values(periodCounts).filter(c => c >= target).length;
}

  const [themeWord, setThemeWord] = useState('Happy');

  const [goals, setGoals] = useState([]);
  const [reading, setReading] = useState([]);
  const [rewards, setRewards] = useState([]);
  const [responsibilities, setResponsibilities] = useState([]); // {id, memberId, text, frequency, completions, log}
  const [events, setEvents] = useState([]);            // {id, date, title, memberId, photo}
  const [mindsetCheckins, setMindsetCheckins] = useState({});
  const [photos, setPhotos] = useState([]);            // {id, dataUrl, caption, date}
  const [badgePlan, setBadgePlan] = useState(DEFAULT_BADGE_PLAN);
  const [loaded, setLoaded] = useState(false);
  const [userEmail, setUserEmail] = useState(null); // null = not logged in
  const [isDemoMode, setIsDemoMode] = useState(false); // true = demo (skip Supabase)

  const [editingMember, setEditingMember] = useState(null);
  const [editingTheme, setEditingTheme] = useState(false);
  const [calendarOpen, setCalendarOpen] = useState(false);
  const [calendarView, setCalendarView] = useState('day'); // 'day' | 'week' | 'month' | 'summer'
  const [monthOffset, setMonthOffset] = useState(0);
  const [newBucket, setNewBucket] = useState('');
  const [newGoal, setNewGoal] = useState({ title: '', target: '', memberId: '', dueDate: '' });
  const [newReading, setNewReading] = useState({ title: '', memberId: '', dueDate: '' });
  const [newReward, setNewReward] = useState({ title: '', badgeCount: '', scope: 'family' });
  const [newResp, setNewResp] = useState({ text: '', memberId: '', frequency: 'daily1' });
  const [newEvent, setNewEvent] = useState({ date: '', title: '', memberId: 'family' });
  const [quickRespPending, setQuickRespPending] = useState(null);
  const [showResetMenu, setShowResetMenu] = useState(false);
  const [showSummaryModal, setShowSummaryModal] = useState(false);
  const [showPhotoBookModal, setShowPhotoBookModal] = useState(false);
  const [meetingComplete, setMeetingComplete] = useState(null); // null = still checking storage
  const [showMeeting, setShowMeeting] = useState(false);

  // ─── Storage helpers — Supabase-backed with localStorage cache ───
  // Real data lives in Supabase (cross-device, secure via RLS).
  // localStorage is kept as a fast local cache so the dashboard feels instant.
  // Demo mode uses localStorage only (no signup required).
  const storageKey = (email) => `soh-dashboard:v5:${email.toLowerCase().trim()}`;
  const REMEMBERED_EMAIL_KEY = 'soh-remembered-email';

  const loadFromStorage = async (email, options = {}) => {
    const key = storageKey(email);

    // Demo mode — localStorage only, never hit Supabase
    if (options.demo) {
      try {
        const raw = window.localStorage.getItem(key);
        if (raw) return JSON.parse(raw);
      } catch (e) {}
      return null;
    }

    // Real users — pull from Supabase (source of truth)
    try {
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        const { data, error } = await sb
          .from('families')
          .select('data')
          .eq('user_id', user.id)
          .maybeSingle();
        if (!error && data && data.data) {
          // Cache locally for next page-load speed
          try { window.localStorage.setItem(key, JSON.stringify(data.data)); } catch (e) {}
          return data.data;
        }
      }
    } catch (e) { console.warn('Supabase load failed, falling back to cache:', e); }

    // Fallback — local cache (offline / first-load before Supabase responds)
    try {
      const raw = window.localStorage.getItem(key);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return null;
  };

  const saveToStorage = async (email, data, options = {}) => {
    const key = storageKey(email);
    const json = JSON.stringify(data);

    // Always write to localStorage first (instant, offline-safe)
    try { window.localStorage.setItem(key, json); }
    catch (e) { console.warn('localStorage save failed (likely quota):', e); }

    // Demo mode stops here — never touches Supabase
    if (options.demo) return;

    // Real users — sync to Supabase
    try {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) return;
      const { error } = await sb
        .from('families')
        .upsert({ user_id: user.id, data: data }, { onConflict: 'user_id' });
      if (error) console.warn('Supabase save failed:', error.message);
    } catch (e) { console.warn('Supabase save error:', e); }
  };

  // ─── Login flow ───
  const handleLogin = async (email, options = {}) => {
    const cleanEmail = email.toLowerCase().trim();
    if (!cleanEmail) return;
    setUserEmail(cleanEmail);
    // Remember this email for next visit (skip for demo)
    if (!options.demo) {
      try { window.localStorage.setItem(REMEMBERED_EMAIL_KEY, cleanEmail); } catch (e) {}
    }

    // DEMO MODE: load pre-built sample family
    if (options.demo) {
      setIsDemoMode(true);
      loadDemoData();
      setLoaded(true);
      return;
    }
    setIsDemoMode(false);

    // Normal flow — load this user's data
    const p = await loadFromStorage(cleanEmail);
    if (p) {
      if (p.themeWord !== undefined) setThemeWord(p.themeWord);
      if (p.themeYear) setThemeYear(p.themeYear);
      if (p.countdownLabel) setCountdownLabel(p.countdownLabel);
      if (p.endDate) setEndDate(p.endDate);
      if (p.family) setFamily(p.family);
      if (p.bucket) setBucket(p.bucket);
      if (p.goals) setGoals(p.goals);
      if (p.reading) setReading(p.reading);
      if (p.rewards) setRewards(p.rewards);
      if (p.responsibilities) setResponsibilities(p.responsibilities);
      if (p.events) setEvents(p.events);
      if (p.mindsetCheckins) setMindsetCheckins(p.mindsetCheckins);
      if (p.photos) setPhotos(p.photos);
      if (p.badgePlan) setBadgePlan({ ...DEFAULT_BADGE_PLAN, ...p.badgePlan });
      const done = !!p.meetingComplete;
      setMeetingComplete(done);
      if (!done) setShowMeeting(true);
    } else {
      // Brand new user — start the wizard fresh
      setMeetingComplete(false);
      setShowMeeting(true);
    }
    setLoaded(true);
  };

  // ─── Auth: restore session on page load (handles magic-link returns too) ───
  useEffect(() => {
    let mounted = true;

    // First: if Supabase put tokens in the URL (from magic-link redirect),
    // explicitly process them. This catches the case where getSession()
    // fires before the SDK has parsed the URL hash.
    const processUrlSession = async () => {
      const hash = window.location.hash;
      if (hash && hash.includes('access_token')) {
        try {
          const params = new URLSearchParams(hash.substring(1));
          const access_token = params.get('access_token');
          const refresh_token = params.get('refresh_token');
          if (access_token && refresh_token) {
            await sb.auth.setSession({ access_token, refresh_token });
            // Clean the URL so the tokens don't sit in the address bar
            window.history.replaceState(null, '', window.location.pathname + window.location.search);
          }
        } catch (e) { console.warn('URL session parse failed:', e); }
      }
    };

    (async () => {
      await processUrlSession();
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (mounted && session && session.user && session.user.email) {
          handleLogin(session.user.email, { fromSession: true });
        }
      } catch (e) { console.warn('Session check failed:', e); }
    })();

    // Listen for sign-in events (e.g. magic link click)
    const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session && session.user && session.user.email) {
        handleLogin(session.user.email, { fromSession: true });
      }
    });
    return () => { mounted = false; subscription.unsubscribe(); };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // ─── Demo / sample data loader ───
  // Loads a fully populated family for testing/preview. Available as a button
  // on the login screen and on the dashboard footer.
  const loadDemoData = () => {
    const sample = buildSampleFamilyData();
    setThemeWord(sample.themeWord);
    setThemeYear(sample.themeYear);
    setCountdownLabel(sample.countdownLabel);
    setEndDate(sample.endDate);
    setFamily(sample.family);
    setBucket(sample.bucket);
    setGoals(sample.goals);
    setReading(sample.reading);
    setRewards(sample.rewards);
    setResponsibilities(sample.responsibilities);
    setEvents(sample.events);
    setMindsetCheckins(sample.mindsetCheckins);
    setPhotos([]);
    setBadgePlan(sample.badgePlan);
    setMeetingComplete(true);
    setShowMeeting(false);
  };

  const handleLogout = async () => {
    // Sign out of Supabase (unless we're in demo mode)
    if (!isDemoMode) {
      try { await sb.auth.signOut(); } catch (e) {}
    }
    // Clear remembered email but keep their data in storage
    try { window.localStorage.removeItem(REMEMBERED_EMAIL_KEY); } catch (e) {}
    setUserEmail(null);
    setIsDemoMode(false);
    setLoaded(false);
    // Reset all state to defaults
    setThemeWord('Happy'); setThemeYear('2026'); setCountdownLabel('end of summer'); setEndDate(DEFAULT_END);
    setFamily(DEFAULT_FAMILY); setBucket([]); setGoals([]); setReading([]); setRewards([]);
    setResponsibilities([]); setEvents([]); setMindsetCheckins({}); setPhotos([]);
    setBadgePlan(DEFAULT_BADGE_PLAN); setMeetingComplete(null); setShowMeeting(false);
  };

  // Save whenever data changes (only after login)
  useEffect(() => {
    if (!loaded || !userEmail) return;
    saveToStorage(userEmail, {
      themeWord, themeYear, countdownLabel, endDate, family, bucket, goals, reading, rewards,
      responsibilities, events, mindsetCheckins, photos, meetingComplete, badgePlan,
    }, { demo: isDemoMode });
  }, [userEmail, isDemoMode, themeWord, themeYear, countdownLabel, endDate, family, bucket, goals, reading, rewards,
      responsibilities, events, mindsetCheckins, photos, meetingComplete, badgePlan, loaded]);

  // ─── Computed ───
  const bucketDone = bucket.filter(b => b.done).length;
  const readingByMember = reading.reduce((acc, r) => { (acc[r.memberId] = acc[r.memberId] || []).push(r); return acc; }, {});
  const respCountByMember = responsibilities.reduce((acc, c) => { acc[c.memberId] = (acc[c.memberId] || 0) + (c.completions || 0); return acc; }, {});
  const totalResp = Object.values(respCountByMember).reduce((a, b) => a + b, 0);

  const daysLeft = useMemo(() => {
    const today = new Date(); today.setHours(0,0,0,0);
    const end = parseDate(endDate); if (!end) return null;
    return daysBetween(new Date(today), new Date(end));
  }, [endDate]);

  const weeks = useMemo(() => summerWeeks(SUMMER_START, endDate), [endDate]);

  // Context for badge progress engine
  const badgeCtx = { reading, responsibilities, goals };

  // For a member, compute progress on all 3 badges (returns array of { def, config, progress })
  const badgeProgressForMember = (memberId) => {
    const cfg = badgesFor(badgePlan, memberId);
    return BADGE_DEFS.map(def => ({
      def,
      config: cfg[def.id],
      progress: computeBadgeProgress(memberId, def.id, cfg[def.id], badgeCtx),
    }));
  };

  // Total badge instances earned by a member across all periods + cadences
  const badgesEarnedByMember = (memberId) => {
    return badgeProgressForMember(memberId).reduce((sum, b) => sum + b.progress.earnedTotal, 0);
  };

  // Summer Champ bonus — earned 1× for the family when bucket items hit threshold
  const summerChampEarned = bucketDone >= (badgePlan.summerChampBucket || 10) ? 1 : 0;

  const totalBadgesEarned = family.reduce((sum, m) => sum + badgesEarnedByMember(m.id), 0)
    + (summerChampEarned ? family.length : 0);  // Summer Champ counts once per family member

  const badgesByMember = (mid) => {
    const m = family.find(f => f.id === mid); if (!m) return 0;
    return badgesEarnedByMember(mid) + summerChampEarned;
  };

  // ─── Actions ───
  const resetToDefaults = () => {
    setThemeWord('Happy'); setThemeYear('2026'); setCountdownLabel('end of summer'); setEndDate(DEFAULT_END);
    setFamily(DEFAULT_FAMILY);
    setBucket(STARTER_BUCKET.map((t, i) => ({ id: Date.now() + i, text: t, done: false })));
    setGoals([]); setReading([]); setRewards([]); setResponsibilities([]); setEvents([]);
    setMindsetCheckins({}); setPhotos([]); setShowResetMenu(false);
  };
  const clearForOthers = () => {
    setThemeWord(''); setThemeYear('2026'); setCountdownLabel('end of summer'); setEndDate(DEFAULT_END);
    setFamily([{ id: Date.now(), name: '', color: C.coral, mindset: '', emoji: '🌼' }]);
    setBucket([]); setGoals([]); setReading([]); setRewards([]); setResponsibilities([]); setEvents([]);
    setMindsetCheckins({}); setPhotos([]); setShowResetMenu(false); setEditingTheme(true);
  };

  const addMember = () => {
    const m = { id: Date.now(), name: 'New', color: MEMBER_COLORS[family.length % MEMBER_COLORS.length],
                mindset: '', emoji: EMOJI_OPTIONS[family.length % EMOJI_OPTIONS.length] };
    setFamily([...family, m]); setEditingMember(m.id);
  };
  const updateMember = (id, u) => setFamily(family.map(m => m.id === id ? { ...m, ...u } : m));
  const removeMember = (id) => {
    setFamily(family.filter(m => m.id !== id));
    setGoals(goals.filter(g => g.memberId !== id));
    setReading(reading.filter(r => r.memberId !== id));
    setResponsibilities(responsibilities.filter(c => c.memberId !== id));
    setEvents(events.filter(e => e.memberId !== id));
  };

  const addBucket = () => { if (!newBucket.trim()) return;
    setBucket([...bucket, { id: Date.now(), text: newBucket.trim(), done: false }]); setNewBucket(''); };
  const toggleBucket = (id) => setBucket(bucket.map(b => b.id === id ? { ...b, done: !b.done } : b));
  const removeBucket = (id) => setBucket(bucket.filter(b => b.id !== id));

  const addGoal = () => { if (!newGoal.title.trim() || !newGoal.memberId) return;
    setGoals([...goals, { id: Date.now(), title: newGoal.title.trim(),
      target: parseInt(newGoal.target) || 1, progress: 0, memberId: parseInt(newGoal.memberId),
      dueDate: newGoal.dueDate || null, progressLog: [] }]);
    setNewGoal({ title: '', target: '', memberId: '', dueDate: '' }); };
  const updateGoalProgress = (id, d) => setGoals(goals.map(g => {
    if (g.id !== id) return g;
    const next = Math.max(0, Math.min(g.target, g.progress + d));
    if (next === g.progress) return g;
    const log = [...(g.progressLog || [])];
    if (d > 0) log.push({ date: formatISO(new Date()) });
    return { ...g, progress: next, progressLog: log };
  }));
  const removeGoal = (id) => setGoals(goals.filter(g => g.id !== id));

  const addReading = () => { if (!newReading.title.trim() || !newReading.memberId) return;
    setReading([...reading, { id: Date.now(), title: newReading.title.trim(),
      memberId: parseInt(newReading.memberId), done: false,
      dueDate: newReading.dueDate || null, completedDate: null }]);
    setNewReading({ title: '', memberId: '', dueDate: '' }); };
  const toggleReading = (id) => setReading(reading.map(r => {
    if (r.id !== id) return r;
    const nowDone = !r.done;
    return { ...r, done: nowDone, completedDate: nowDone ? formatISO(new Date()) : null };
  }));
  const removeReading = (id) => setReading(reading.filter(r => r.id !== id));

  const addReward = () => { if (!newReward.title.trim() || !newReward.badgeCount) return;
    setRewards([...rewards, { id: Date.now(), title: newReward.title.trim(),
      badgeCount: parseInt(newReward.badgeCount), claimed: false, scope: newReward.scope }]);
    setNewReward({ title: '', badgeCount: '', scope: 'family' }); };
  const toggleReward = (id) => setRewards(rewards.map(r => r.id === id ? { ...r, claimed: !r.claimed } : r));
  const removeReward = (id) => setRewards(rewards.filter(r => r.id !== id));

  const addResp = (text, memberId, frequency) => {
    const t = (text || newResp.text).trim();
    const mid = memberId || newResp.memberId;
    const fq = frequency || newResp.frequency || 'daily1';
    if (!t || !mid) return;
    setResponsibilities([...responsibilities, { id: Date.now() + Math.random(), text: t,
      memberId: parseInt(mid), frequency: fq, completions: 0, log: [] }]);
    setNewResp({ text: '', memberId: newResp.memberId, frequency: fq });
  };
  const bumpResp = (id, d, dateOverride) => setResponsibilities(responsibilities.map(c => {
    if (c.id !== id) return c;
    const next = Math.max(0, (c.completions || 0) + d);
    if (next === (c.completions || 0)) return c;
    const log = [...(c.log || [])];
    const targetDate = dateOverride || formatISO(new Date());
    if (d > 0) {
      log.push(targetDate);
    } else if (dateOverride) {
      // When unchecking on a specific date, remove that date's entry (or the last one if not found)
      const idx = log.lastIndexOf(dateOverride);
      if (idx >= 0) log.splice(idx, 1); else log.pop();
    } else if (log.length) {
      log.pop();
    }
    return { ...c, completions: next, log };
  }));
  const removeResp = (id) => setResponsibilities(responsibilities.filter(c => c.id !== id));

  const handleQuickRespClick = (text) => {
    if (family.length === 1) { addResp(text, family[0].id, newResp.frequency || 'daily1'); return; }
    setQuickRespPending(text);
  };
  const assignQuickResp = (memberId, frequency) => {
    if (!quickRespPending) return;
    addResp(quickRespPending, memberId, frequency);
    setQuickRespPending(null);
  };

  const addEvent = () => { if (!newEvent.date || !newEvent.title.trim()) return;
    setEvents([...events, { id: Date.now(), date: newEvent.date, title: newEvent.title.trim(),
      memberId: newEvent.memberId === 'family' ? 'family' : parseInt(newEvent.memberId) }]);
    setNewEvent({ date: '', title: '', memberId: 'family' }); };
  const removeEvent = (id) => setEvents(events.filter(e => e.id !== id));

  const toggleMindset = (mid, wk) => {
    const k = `${mid}_${wk}`;
    setMindsetCheckins(prev => { const next = { ...prev }; if (next[k]) delete next[k]; else next[k] = true; return next; });
  };

 const addPhoto = async (file, caption) => {
    // Demo mode: keep old behavior, store as base64 in memory only
    if (isDemoMode) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        setPhotos(prev => [...prev, {
          id: Date.now() + Math.random(),
          dataUrl: ev.target.result,
          caption: caption || '',
          date: formatISO(new Date()),
        }]);
      };
      reader.readAsDataURL(file);
      return;
    }
    // Real users: upload to Supabase Storage
    try {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) { console.warn('addPhoto: no user'); return; }
      const photoId = Date.now() + Math.random();
      const ext = (file.type === 'image/png') ? 'png' : 'jpg';
      const path = `${user.id}/${photoId}.${ext}`;
      const { error } = await sb.storage.from('family-photos')
        .upload(path, file, { contentType: file.type, upsert: false });
      if (error) { console.error('Photo upload failed:', error); alert('Photo upload failed. Please try again.'); return; }
      setPhotos(prev => [...prev, {
        id: photoId,
        path,
        caption: caption || '',
        date: formatISO(new Date()),
      }]);
    } catch (e) {
      console.error('addPhoto error:', e);
      alert('Photo upload failed. Please try again.');
    }
  };
  const updatePhotoCaption = (id, caption) => setPhotos(photos.map(p => p.id === id ? { ...p, caption } : p));
  const removePhoto = async (id) => {
    const photo = photos.find(p => p.id === id);
    setPhotos(prev => prev.filter(p => p.id !== id));
    // Demo mode or no path: nothing to delete from Storage
    if (isDemoMode || !photo || !photo.path) return;
    try {
      const { error } = await sb.storage.from('family-photos').remove([photo.path]);
      if (error) console.warn('Photo delete from Storage failed:', error);
    } catch (e) {
      console.warn('removePhoto error:', e);
    }
  };

  // ─── Family Meeting handlers ───
  const completeMeeting = (wizardData) => {
    // wizardData: { themeWord, members, bucketItems, perMemberGoals, perMemberBooks, countdownLabel, endDate, badgePlan, isFirstTimeSetup }
    if (wizardData.themeWord) setThemeWord(wizardData.themeWord);
    if (wizardData.countdownLabel) setCountdownLabel(wizardData.countdownLabel);
    if (wizardData.endDate) setEndDate(wizardData.endDate);
    if (wizardData.members && wizardData.members.length) setFamily(wizardData.members);
    if (wizardData.badgePlan) setBadgePlan(wizardData.badgePlan);

    // Only replace bucket/goals/books on FIRST-TIME setup.
    // On edits, preserve existing progress and only add new items the family typed in.
    if (wizardData.isFirstTimeSetup) {
      if (wizardData.bucketItems && wizardData.bucketItems.length) {
        setBucket(wizardData.bucketItems.map((t, i) => ({ id: Date.now() + i, text: t, done: false })));
      }
      if (wizardData.perMemberGoals) {
        const newGoals = [];
        Object.entries(wizardData.perMemberGoals).forEach(([mid, list]) => {
          list.forEach((g, i) => {
            newGoals.push({ id: Date.now() + Math.random() + i,
              title: g.title, target: g.target || 1, progress: 0,
              memberId: parseInt(mid), dueDate: 'end', progressLog: [] });
          });
        });
        setGoals(newGoals);
      }
      if (wizardData.perMemberBooks) {
        const newBooks = [];
        Object.entries(wizardData.perMemberBooks).forEach(([mid, list]) => {
          list.forEach((title, i) => {
            newBooks.push({ id: Date.now() + Math.random() + i,
              title, memberId: parseInt(mid), done: false,
              dueDate: 'end', completedDate: null });
          });
        });
        setReading(newBooks);
      }
    } else {
      // EDIT mode: merge — add NEW bucket items, goals, books that don't already exist
      if (wizardData.bucketItems && wizardData.bucketItems.length) {
        const existingTexts = bucket.map(b => b.text.toLowerCase().trim());
        const newBuckets = wizardData.bucketItems
          .filter(t => !existingTexts.includes(t.toLowerCase().trim()))
          .map((t, i) => ({ id: Date.now() + Math.random() + i, text: t, done: false }));
        if (newBuckets.length) setBucket([...bucket, ...newBuckets]);
      }
      if (wizardData.perMemberGoals) {
        const additions = [];
        Object.entries(wizardData.perMemberGoals).forEach(([mid, list]) => {
          const mid_int = parseInt(mid);
          const existing = goals.filter(g => g.memberId === mid_int).map(g => g.title.toLowerCase().trim());
          list.forEach((g, i) => {
            if (!existing.includes(g.title.toLowerCase().trim())) {
              additions.push({ id: Date.now() + Math.random() + i,
                title: g.title, target: g.target || 1, progress: 0,
                memberId: mid_int, dueDate: 'end', progressLog: [] });
            }
          });
        });
        if (additions.length) setGoals([...goals, ...additions]);
      }
      if (wizardData.perMemberBooks) {
        const additions = [];
        Object.entries(wizardData.perMemberBooks).forEach(([mid, list]) => {
          const mid_int = parseInt(mid);
          const existing = reading.filter(r => r.memberId === mid_int).map(r => r.title.toLowerCase().trim());
          list.forEach((title, i) => {
            if (!existing.includes(title.toLowerCase().trim())) {
              additions.push({ id: Date.now() + Math.random() + i,
                title, memberId: mid_int, done: false,
                dueDate: 'end', completedDate: null });
            }
          });
        });
        if (additions.length) setReading([...reading, ...additions]);
      }
    }

    setMeetingComplete(true);
    setShowMeeting(false);
  };

  const startNewMeeting = () => {
    // Don't wipe existing data — just open the wizard, which will replace what they confirm
    setShowMeeting(true);
  };

  // ═════════════════════════════════════════════════════════════════
  // LOGIN branch — show login screen if no user is logged in
  // ═════════════════════════════════════════════════════════════════
  if (!userEmail) {
    return <LoginScreen onLogin={handleLogin} />;
  }

  // ═════════════════════════════════════════════════════════════════
  // WIZARD branch — render Family Meeting if not yet done, or if user reopens it
  // ═════════════════════════════════════════════════════════════════
  if (loaded && showMeeting) {
    return (
      <FamilyMeeting
        existingFamily={meetingComplete ? family : null}
        existingBucket={meetingComplete ? bucket.map(b => b.text) : null}
        existingTheme={meetingComplete ? themeWord : ''}
        existingEndDate={endDate}
        existingCountdownLabel={countdownLabel}
        existingBadgePlan={badgePlan}
        isFirstTimeSetup={!meetingComplete}
        onComplete={completeMeeting}
        onCancel={meetingComplete ? () => setShowMeeting(false) : null}
      />
    );
  }

  // ═════════════════════════════════════════════════════════════════
  return (
    <div className="soh-dash-root" style={{ background: C.cream, color: C.ink, padding: '40px 16px 80px',
      position: 'relative', overflow: 'hidden', borderRadius: 16 }}>
      <style>{`
        .soh-scribble-card { background: ${C.paper}; border-radius: 20px; padding: 24px;
          box-shadow: 0 2px 0 ${C.ink}15, 0 8px 24px ${C.ink}08; }
        .soh-input { padding: 10px 14px; border-radius: 12px; border: 2px solid ${C.ink}15;
          background: ${C.paper}; font-size: 14px; color: ${C.ink}; outline: none;
          font-family: inherit; font-weight: 500; width: 100%; box-sizing: border-box;
          transition: border-color 0.15s ease; }
        .soh-input:focus { border-color: ${C.coral}; }
        .soh-pill-btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px;
          padding: 10px 18px; border-radius: 999px; border: none; font-weight: 700; font-size: 14px;
          cursor: pointer; font-family: inherit; transition: transform 0.12s ease; }
        .soh-pill-btn:hover { transform: translateY(-1px); }
        @keyframes soh-float { 0%, 100% { transform: translateY(0) rotate(var(--rot, 0deg)); }
          50% { transform: translateY(-6px) rotate(var(--rot, 0deg)); } }
        .soh-float { animation: soh-float 4s ease-in-out infinite; }
        @keyframes soh-pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .soh-pop { animation: soh-pop 0.4s ease-out; }

        /* Responsive form grids — stack on mobile */
        .soh-form-grid { display: grid; gap: 10px; }
        .soh-form-grid.cols-add4 { grid-template-columns: 1.4fr 0.9fr 0.9fr auto; }
        .soh-form-grid.cols-add3 { grid-template-columns: 1.4fr 0.9fr 0.9fr auto; }
        .soh-form-grid.cols-goal5 { grid-template-columns: 1.3fr 70px 0.9fr 0.9fr auto; }
        .soh-form-grid.cols-reward { grid-template-columns: 1.4fr 0.7fr 1fr auto; }
        .soh-form-grid.cols-event { grid-template-columns: 0.8fr 1.4fr 1fr auto; }

        @media (max-width: 640px) {
          .soh-scribble-card { padding: 16px; border-radius: 16px; }
          .soh-form-grid { grid-template-columns: 1fr !important; }
          .soh-form-grid .soh-pill-btn { width: 100%; }
          .soh-mobile-hide { display: none !important; }
          .soh-mobile-stack { flex-direction: column !important; align-items: stretch !important; }
          .soh-mobile-full { width: 100% !important; }
          .soh-dash-root { padding: 24px 12px 60px !important; border-radius: 0 !important; }
        }
      `}</style>

      <div style={{ maxWidth: 1000, margin: '0 auto', position: 'relative' }}>

        {/* Persistent edit + logout buttons — always visible at top right */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8, gap: 8, flexWrap: 'wrap' }}>
          <div style={{ fontSize: 12, opacity: 0.55, fontWeight: 600 }}>
            Signed in as <strong style={{ color: C.coral }}>{userEmail}</strong>
          </div>
          <div style={{ display: 'flex', gap: 6 }}>
            <button onClick={startNewMeeting} style={{
              background: C.paper, color: C.ink,
              border: `1.5px solid ${C.ink}15`, borderRadius: 999,
              padding: '6px 14px', fontWeight: 700, fontSize: 13,
              cursor: 'pointer', fontFamily: 'inherit',
              display: 'inline-flex', alignItems: 'center', gap: 6,
              boxShadow: `0 2px 0 ${C.ink}10`,
            }}>
              <IconEdit size={13} /> Edit Family Meeting
            </button>
            <button onClick={handleLogout} style={{
              background: 'transparent', color: C.inkSoft,
              border: `1.5px solid ${C.ink}15`, borderRadius: 999,
              padding: '6px 14px', fontWeight: 600, fontSize: 13,
              cursor: 'pointer', fontFamily: 'inherit',
            }}>
              Sign out
            </button>
          </div>
        </div>

        <StickerHeader themeWord={themeWord} themeYear={themeYear}
          editing={editingTheme} setEditing={setEditingTheme}
          setWord={setThemeWord} setYear={setThemeYear} />

        <Countdown daysLeft={daysLeft} endDate={endDate} setEndDate={setEndDate}
          label={countdownLabel} setLabel={setCountdownLabel} />

        <CalendarSection
          open={calendarOpen} setOpen={setCalendarOpen}
          view={calendarView} setView={setCalendarView}
          monthOffset={monthOffset} setMonthOffset={setMonthOffset}
          family={family} events={events} goals={goals} reading={reading}
          responsibilities={responsibilities} bumpResp={bumpResp}
          newEvent={newEvent} setNewEvent={setNewEvent}
          addEvent={addEvent} removeEvent={removeEvent}
        />

        <SectionLabel title="our crew" icon={<IconUsers size={20} />} accent={C.coral} />
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(290px, 1fr))', gap: 20, marginBottom: 56 }}>
          {family.map((member) => (
            <CrewCard key={member.id} member={member}
              badgeProgress={badgeProgressForMember(member.id)}
              totalEarned={badgesEarnedByMember(member.id) + summerChampEarned}
              summerChampEarned={summerChampEarned}
              summerChampTarget={badgePlan.summerChampBucket || 10}
              bucketDone={bucketDone}
              onMindsetCheckin={(wk) => toggleMindset(member.id, wk)}
              mindsetCheckins={mindsetCheckins}
              readingCount={readingByMember[member.id]?.filter(r => r.done).length || 0}
              goalCount={goals.filter(g => g.memberId === member.id && g.progress >= g.target).length}
              respCount={respCountByMember[member.id] || 0}
              isEditing={editingMember === member.id}
              onEdit={() => setEditingMember(member.id)}
              onSave={() => setEditingMember(null)}
              onUpdate={(u) => updateMember(member.id, u)}
              onRemove={() => removeMember(member.id)}
              canRemove={family.length > 1}
              themeWord={themeWord} />
          ))}
          <AddCard onClick={addMember} label="Add member" />
        </div>

        {/* ─── READING ─── */}
        <SectionLabel title="summer reading challenge" icon={<IconBook size={20} />} accent={C.sage} />
        <div className="soh-scribble-card" style={{ marginBottom: 56 }}>
          <div className="soh-form-grid cols-add3" style={{ marginBottom: 18 }}>
            <input className="soh-input" value={newReading.title}
              onChange={e => setNewReading({ ...newReading, title: e.target.value })}
              placeholder="Book title..." onKeyDown={e => e.key === 'Enter' && addReading()} />
            <select className="soh-input" value={newReading.memberId}
              onChange={e => setNewReading({ ...newReading, memberId: e.target.value })}
              style={{ cursor: 'pointer' }}>
              <option value="">Whose book?</option>
              {family.map(m => <option key={m.id} value={m.id}>{m.emoji} {m.name}</option>)}
            </select>
            <DueDatePicker value={newReading.dueDate} endDate={endDate}
              onChange={v => setNewReading({ ...newReading, dueDate: v })} />
            <button className="soh-pill-btn" onClick={addReading} style={{ background: C.coral, color: 'white' }}>
              <IconPlus size={16} /> Add
            </button>
          </div>
          {reading.length === 0 ? (
            <EmptyState text="No books on the list yet. Add a book and assign it to a reader!" />
          ) : (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 14 }}>
              {family.map(m => {
                const books = reading.filter(r => r.memberId === m.id);
                if (books.length === 0) return null;
                const done = books.filter(b => b.done).length;
                return (
                  <div key={m.id} style={{ background: C.cream, borderRadius: 16, padding: 14 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                      <span style={{ fontSize: 22 }}>{m.emoji}</span>
                      <strong style={{ fontSize: 16, fontFamily: '"Tutti Frutti", "Fraunces", serif' }}>{m.name}</strong>
                      <span style={{ marginLeft: 'auto', fontSize: 12, fontWeight: 700,
                        background: m.color, color: 'white', padding: '3px 10px', borderRadius: 999 }}>
                        {done}/{books.length}
                      </span>
                    </div>
                    <ul style={{ listStyle: 'none', padding: 0, margin: 0, display: 'flex', flexDirection: 'column', gap: 6 }}>
                      {books.map(b => (
                        <li key={b.id} style={{ display: 'flex', alignItems: 'flex-start', gap: 8, fontSize: 14, padding: '4px 0' }}>
                          <SoftCheckbox checked={b.done} onClick={() => toggleReading(b.id)} color={m.color} />
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ textDecoration: b.done ? 'line-through' : 'none', opacity: b.done ? 0.5 : 1 }}>
                              {b.title}
                            </div>
                            {b.dueDate && <DueDateLabel due={b.dueDate} done={b.done} endDate={endDate} />}
                          </div>
                          <XBtn onClick={() => removeReading(b.id)} />
                        </li>
                      ))}
                    </ul>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* ─── RESPONSIBILITIES ─── */}
        <SectionLabel title="our responsibilities" icon={<IconHome size={20} />} accent={C.mustard} />
        <div className="soh-scribble-card" style={{ marginBottom: 56 }}>
          {totalResp > 0 && (
            <div style={{ background: C.butter, borderRadius: 12, padding: '10px 14px',
              marginBottom: 16, display: 'flex', alignItems: 'center', gap: 10,
              fontWeight: 600, fontSize: 14, color: C.ink }}>
              <IconSparkles size={18} />
              <span>The family has knocked out <strong style={{ fontSize: 18 }}>{totalResp}</strong> responsibilities so far. Way to go!</span>
            </div>
          )}
          <div className="soh-form-grid cols-add3" style={{ marginBottom: 12 }}>
            <input className="soh-input" value={newResp.text}
              onChange={e => setNewResp({ ...newResp, text: e.target.value })}
              placeholder="Add a responsibility..." onKeyDown={e => e.key === 'Enter' && addResp()} />
            <select className="soh-input" value={newResp.memberId}
              onChange={e => setNewResp({ ...newResp, memberId: e.target.value })}
              style={{ cursor: 'pointer' }}>
              <option value="">Whose?</option>
              {family.map(m => <option key={m.id} value={m.id}>{m.emoji} {m.name}</option>)}
            </select>
            <select className="soh-input" value={newResp.frequency}
              onChange={e => setNewResp({ ...newResp, frequency: e.target.value })}
              style={{ cursor: 'pointer' }}>
              {FREQUENCIES.map(f => <option key={f.id} value={f.id}>{f.label}</option>)}
            </select>
            <button className="soh-pill-btn" onClick={() => addResp()} style={{ background: C.coral, color: 'white' }}>
              <IconPlus size={16} /> Add
            </button>
          </div>

          {/* Quick add — click a chip first, then pick who + frequency */}
          <div style={{ marginBottom: 18 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em',
              textTransform: 'uppercase', marginBottom: 8, opacity: 0.55 }}>
              Quick add {quickRespPending && `— pick who "${quickRespPending}" is for & how often:`}
            </div>

            {quickRespPending ? (
              <QuickAssignRow pending={quickRespPending} family={family}
                onAssign={(mid, freq) => assignQuickResp(mid, freq)}
                onCancel={() => setQuickRespPending(null)} />
            ) : (
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                {RESPONSIBILITY_SUGGESTIONS.map(s => (
                  <button key={s} onClick={() => handleQuickRespClick(s)} style={{
                    background: C.paper, border: `1.5px solid ${C.ink}15`,
                    borderRadius: 999, padding: '6px 12px',
                    fontWeight: 600, fontSize: 13, cursor: 'pointer',
                    color: C.ink, fontFamily: 'inherit',
                  }}>{s}</button>
                ))}
              </div>
            )}
          </div>

          {responsibilities.length === 0 ? (
            <EmptyState text="No responsibilities yet. Tap a quick-add chip above to get started!" />
          ) : (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 14 }}>
              {family.map(m => {
                const memberResp = responsibilities.filter(c => c.memberId === m.id);
                if (memberResp.length === 0) return null;
                const memberTotal = respCountByMember[m.id] || 0;
                return (
                  <div key={m.id} style={{ background: C.cream, borderRadius: 16, padding: 14 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
                      <span style={{ fontSize: 22 }}>{m.emoji}</span>
                      <strong style={{ fontSize: 16, fontFamily: '"Tutti Frutti", "Fraunces", serif' }}>{m.name}</strong>
                      <span style={{ marginLeft: 'auto', fontSize: 12, fontWeight: 700,
                        background: m.color, color: 'white', padding: '3px 10px', borderRadius: 999 }}>
                        {memberTotal} done
                      </span>
                    </div>
                    <ul style={{ listStyle: 'none', padding: 0, margin: 0, display: 'flex', flexDirection: 'column', gap: 6 }}>
                      {memberResp.map(c => (
                        <RespItem key={c.id} resp={c} memberColor={m.color}
                          onBump={(d) => bumpResp(c.id, d)} onRemove={() => removeResp(c.id)} />
                      ))}
                    </ul>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* ─── BUCKET LIST ─── */}
        <SectionLabel title="summer bucket list" icon={<IconList size={20} />} accent={C.blush} />
        <div className="soh-scribble-card" style={{ marginBottom: 56 }}>
          {bucket.length > 0 && (
            <ProgressBar value={bucketDone} max={bucket.length} color={C.coral}
              label={`${bucketDone} of ${bucket.length} adventures done`} />
          )}
          <div style={{ display: 'flex', gap: 10, marginBottom: 14 }}>
            <input className="soh-input" value={newBucket} onChange={e => setNewBucket(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addBucket()} placeholder="Add an adventure..." />
            <button className="soh-pill-btn" onClick={addBucket} style={{ background: C.coral, color: 'white' }}>
              <IconPlus size={16} /> Add
            </button>
          </div>
          {bucket.length === 0 ? (
            <EmptyState text="No adventures yet. Add your first one above!" />
          ) : (
            <ul style={{ listStyle: 'none', padding: 0, margin: 0, display: 'grid', gap: 6 }}>
              {bucket.map(item => (
                <li key={item.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px',
                  background: item.done ? C.butter : C.cream, borderRadius: 12 }}>
                  <SoftCheckbox checked={item.done} onClick={() => toggleBucket(item.id)} color={C.coral} large />
                  <span style={{ flex: 1, fontSize: 15, fontWeight: 600,
                    textDecoration: item.done ? 'line-through' : 'none', opacity: item.done ? 0.6 : 1 }}>
                    {item.text}
                  </span>
                  <XBtn onClick={() => removeBucket(item.id)} />
                </li>
              ))}
            </ul>
          )}
        </div>

        {/* ─── PERSONAL GOALS ─── */}
        <SectionLabel title="personal goals" icon={<IconTarget size={20} />} accent={C.navy} />
        <div className="soh-scribble-card" style={{ marginBottom: 56 }}>
          <div className="soh-form-grid cols-goal5" style={{ marginBottom: 18 }}>
            <input className="soh-input" value={newGoal.title}
              onChange={e => setNewGoal({ ...newGoal, title: e.target.value })} placeholder="Learn guitar..." />
            <input className="soh-input" value={newGoal.target}
              onChange={e => setNewGoal({ ...newGoal, target: e.target.value })} placeholder="#" type="number" />
            <select className="soh-input" value={newGoal.memberId}
              onChange={e => setNewGoal({ ...newGoal, memberId: e.target.value })} style={{ cursor: 'pointer' }}>
              <option value="">Whose?</option>
              {family.map(m => <option key={m.id} value={m.id}>{m.emoji} {m.name}</option>)}
            </select>
            <DueDatePicker value={newGoal.dueDate} endDate={endDate}
              onChange={v => setNewGoal({ ...newGoal, dueDate: v })} />
            <button className="soh-pill-btn" onClick={addGoal} style={{ background: C.coral, color: 'white' }}>
              <IconPlus size={16} />
            </button>
          </div>
          {goals.length === 0 ? (
            <EmptyState text='Try: "Read 5 books", "Practice guitar 30 days", "Run a mile"' />
          ) : (
            <div style={{ display: 'grid', gap: 10 }}>
              {goals.map(goal => {
                const member = family.find(m => m.id === goal.memberId);
                const pct = Math.min(100, Math.round((goal.progress / goal.target) * 100));
                const complete = goal.progress >= goal.target;
                return (
                  <div key={goal.id} style={{ background: C.cream, borderRadius: 14, padding: 14 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10, gap: 8 }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 15, fontWeight: 700, fontFamily: '"Tutti Frutti", "Fraunces", serif' }}>
                          {complete && '🎉 '}{goal.title}
                        </div>
                        <div style={{ fontSize: 12, opacity: 0.7, marginTop: 2, display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
                          <span>{member ? `${member.emoji} ${member.name}` : 'Unassigned'} · {goal.progress} / {goal.target}</span>
                          {goal.dueDate && <DueDateLabel due={goal.dueDate} done={complete} endDate={endDate} inline />}
                        </div>
                      </div>
                      <div style={{ display: 'flex', gap: 4 }}>
                        <MiniBtn onClick={() => updateGoalProgress(goal.id, -1)} color={C.ink}>−</MiniBtn>
                        <MiniBtn onClick={() => updateGoalProgress(goal.id, 1)} color={member?.color || C.coral} filled>+</MiniBtn>
                        <XBtn onClick={() => removeGoal(goal.id)} />
                      </div>
                    </div>
                    <div style={{ height: 10, background: C.paper, borderRadius: 999, overflow: 'hidden' }}>
                      <div style={{ width: `${pct}%`, height: '100%',
                        background: complete ? C.coral : (member?.color || C.coral),
                        transition: 'width 0.4s ease' }} />
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* ─── PHOTOS ─── */}
        <SectionLabel title="summer photos" icon={<IconCamera size={20} />} accent={C.orange} />
        <PhotoSection photos={photos} addPhoto={addPhoto} isDemoMode={isDemoMode}
  updateCaption={updatePhotoCaption} removePhoto={removePhoto} />

        {/* ─── REWARDS ─── */}
        <SectionLabel title="family rewards" icon={<IconGift size={20} />} accent={C.rose} />
        <p style={{ fontSize: 13, opacity: 0.7, margin: '-12px 0 14px 4px', maxWidth: 560, lineHeight: 1.5 }}>
          Set little prizes that grow with your badge count — 5 badges = ice cream night, 25 = a real adventure.
          The whole family pulls in the same direction.
        </p>
        <div className="soh-scribble-card" style={{ marginBottom: 32 }}>
          {/* THE REWARD LADDER — shows current progress + upcoming milestones */}
          <RewardLadder rewards={rewards} totalBadgesEarned={totalBadgesEarned}
            badgesByMember={badgesByMember} family={family} />

          <div className="soh-form-grid cols-reward" style={{ marginBottom: 14 }}>
            <input className="soh-input" value={newReward.title}
              onChange={e => setNewReward({ ...newReward, title: e.target.value })}
              placeholder="Ice cream night, pizza party, day trip..." />
            <input className="soh-input" value={newReward.badgeCount}
              onChange={e => setNewReward({ ...newReward, badgeCount: e.target.value })}
              placeholder="# badges" type="number" />
            <select className="soh-input" value={newReward.scope}
              onChange={e => setNewReward({ ...newReward, scope: e.target.value })}
              style={{ cursor: 'pointer' }}>
              <option value="family">🏡 For the whole family</option>
              {family.map(m => <option key={m.id} value={m.id}>{m.emoji} For {m.name}</option>)}
            </select>
            <button className="soh-pill-btn" onClick={addReward} style={{ background: C.coral, color: 'white' }}>
              <IconPlus size={16} />
            </button>
          </div>
          {rewards.length === 0 ? (
            <RewardEmptyState onAddExample={(title, count) => {
              setNewReward({ title, badgeCount: String(count), scope: 'family' });
            }} />
          ) : (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))', gap: 12 }}>
              {[...rewards].sort((a, b) => a.badgeCount - b.badgeCount).map(r => {
                const scopeBadges = r.scope === 'family' ? totalBadgesEarned : badgesByMember(r.scope);
                const unlocked = scopeBadges >= r.badgeCount;
                const scopeLabel = r.scope === 'family'
                  ? '🏡 Family'
                  : (() => { const m = family.find(f => f.id === r.scope); return m ? `${m.emoji} ${m.name}` : 'Unknown'; })();
                return (
                  <div key={r.id} style={{
                    background: unlocked ? C.butter : C.cream, borderRadius: 16, padding: 16,
                    boxShadow: unlocked ? `0 4px 16px ${C.coral}22` : 'none', transition: 'all 0.3s' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                      <span style={{ fontSize: 24 }}>{r.claimed ? '✅' : unlocked ? '🎁' : '🔒'}</span>
                      <strong style={{ fontSize: 15, flex: 1, fontFamily: '"Tutti Frutti", "Fraunces", serif',
                        textDecoration: r.claimed ? 'line-through' : 'none' }}>{r.title}</strong>
                      <XBtn onClick={() => removeReward(r.id)} />
                    </div>
                    <div style={{ fontSize: 12, opacity: 0.75, marginBottom: 4, fontWeight: 600 }}>
                      For {scopeLabel}
                    </div>
                    <div style={{ fontSize: 12, opacity: 0.7, marginBottom: 10 }}>
                      Unlock at {r.badgeCount} badges ({scopeBadges} so far){unlocked && !r.claimed && ' — UNLOCKED!'}
                    </div>
                    {unlocked && (
                      <button className="soh-pill-btn" onClick={() => toggleReward(r.id)} style={{
                        background: r.claimed ? C.paper : C.coral,
                        color: r.claimed ? C.ink : 'white', fontSize: 13, width: '100%' }}>
                        {r.claimed ? 'Claim again' : 'Mark claimed! 🎉'}
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* ─── BIG ACTION BUTTONS ─── */}
        <div style={{ marginTop: 40, display: 'flex', gap: 12, flexWrap: 'wrap', justifyContent: 'center' }}>
          <button className="soh-pill-btn" onClick={() => setShowSummaryModal(true)} style={{
            background: C.coral, color: 'white', fontSize: 16, padding: '14px 24px',
            boxShadow: `0 4px 0 ${C.ink}20`,
          }}>
            <IconSparkles size={18} /> Summarize our Summer!
          </button>
          <button className="soh-pill-btn" onClick={() => setShowPhotoBookModal(true)} style={{
            background: C.dustyblue, color: 'white', fontSize: 16, padding: '14px 24px',
            boxShadow: `0 4px 0 ${C.ink}20`,
          }}>
            <IconBookOpen size={18} /> Make a Photo Book
          </button>
        </div>

        {/* ─── FOOTER ─── */}
        <div style={{ marginTop: 48, textAlign: 'center' }}>
          {showResetMenu ? (
            <div className="soh-scribble-card" style={{ display: 'inline-block' }}>
              <p style={{ marginTop: 0, fontWeight: 700, fontFamily: '"Tutti Frutti", "Fraunces", serif', fontSize: 18 }}>What would you like to do?</p>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', justifyContent: 'center' }}>
                <button className="soh-pill-btn" onClick={clearForOthers} style={{ background: C.sage, color: 'white' }}>
                  Clear for another family
                </button>
                <button className="soh-pill-btn" onClick={resetToDefaults} style={{ background: C.coral, color: 'white' }}>
                  Reset to "Summer of Happy"
                </button>
                <button className="soh-pill-btn" onClick={() => setShowResetMenu(false)} style={{ background: C.cream }}>
                  Cancel
                </button>
              </div>
            </div>
          ) : (
            <div style={{ display: 'flex', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>
              <button className="soh-pill-btn" onClick={() => setShowResetMenu(true)}
                style={{ background: C.paper, color: C.ink, fontSize: 13, boxShadow: `0 2px 0 ${C.ink}15` }}>
                <IconRefresh size={14} /> Reset or share blank version
              </button>
              <button className="soh-pill-btn" onClick={loadDemoData}
                style={{ background: C.butter, color: C.ink, fontSize: 13, boxShadow: `0 2px 0 ${C.ink}15` }}
                title="Replace current data with a fully populated sample family (for testing)">
                🎨 Fill with sample data
              </button>
            </div>
          )}
          <p style={{ fontSize: 12, opacity: 0.5, marginTop: 16, fontWeight: 500 }}>Saves automatically ✨</p>
        </div>
      </div>

      {/* ─── MODALS ─── */}
      {showSummaryModal && (
        <SummaryModal onClose={() => setShowSummaryModal(false)}
          themeWord={themeWord} themeYear={themeYear}
          family={family} bucket={bucket} goals={goals} reading={reading}
          responsibilities={responsibilities} events={events} photos={photos} />
      )}
      {showPhotoBookModal && (
        <PhotoBookModal onClose={() => setShowPhotoBookModal(false)}
          themeWord={themeWord} themeYear={themeYear}
          family={family} bucket={bucket} goals={goals} reading={reading}
          events={events} photos={photos} />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// HEADER — rectangular sticker with soft corners
// ═══════════════════════════════════════════════════════════════════
function StickerHeader({ themeWord, themeYear, editing, setEditing, setWord, setYear }) {
  const isEmpty = !themeWord;
  return (
    <div style={{ textAlign: 'center', marginBottom: 28, position: 'relative', padding: '24px 0' }}>
      <DecorSticker style={{ top: 10, left: '10%' }} rotate={-15} size={32}><Sparkle color={C.mustard} /></DecorSticker>
      <DecorSticker style={{ top: 50, right: '12%' }} rotate={20} size={28}><Sparkle color={C.coral} /></DecorSticker>
      <DecorSticker style={{ bottom: 30, left: '18%' }} rotate={-8} size={20}><Dot color={C.sage} /></DecorSticker>
      <DecorSticker style={{ bottom: 50, right: '16%' }} rotate={10} size={24}><Dot color={C.blush} /></DecorSticker>

      <div style={{ position: 'relative', display: 'inline-block', maxWidth: '95%' }}>
        {/* Rectangular sticker with soft corners (replaces the puffy blob) */}
        <div style={{
          position: 'relative',
          background: C.paper,
          borderRadius: 32,
          padding: 'clamp(28px, 5vw, 40px) clamp(20px, 5vw, 56px)',
          boxShadow: `0 8px 24px ${C.ink}15, 0 2px 0 ${C.ink}10`,
        }}>
          <div style={{ display: 'inline-block', background: C.coral, color: 'white',
            padding: '4px 14px', borderRadius: 4, fontFamily: '"Tutti Frutti", "Fraunces", serif',
            fontSize: 13, fontWeight: 700, letterSpacing: '0.15em', textTransform: 'uppercase',
            transform: 'rotate(-2deg)', marginBottom: 20, boxShadow: `2px 2px 0 ${C.ink}10` }}>
            {editing ? (
              <input value={themeYear} onChange={e => setYear(e.target.value)}
                style={{ width: 60, border: 'none', background: 'transparent', textAlign: 'center',
                  fontFamily: 'inherit', fontSize: 13, fontWeight: 700, outline: 'none', color: 'white' }} />
            ) : `our ${themeYear}`}
          </div>

          {editing || isEmpty ? (
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14 }}>
              <div style={{ marginBottom: 4 }}>
                <RainbowWord text="SUMMER OF" sizeClamp="clamp(32px, 5.5vw, 56px)" />
              </div>
              <input value={themeWord} onChange={e => setWord(e.target.value)} placeholder="________" autoFocus
                style={{ background: 'transparent', border: `3px dashed ${C.ink}30`, borderRadius: 12,
                  padding: '6px 24px', fontFamily: '"Tutti Frutti", "Fraunces", serif', fontSize: 'clamp(40px, 8vw, 72px)',
                  fontWeight: 900, color: C.ink, textAlign: 'center',
                  width: 'min(85vw, 480px)', outline: 'none', letterSpacing: '-0.02em' }} />
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', justifyContent: 'center', maxWidth: 440 }}>
                {THEME_SUGGESTIONS.map(s => (
                  <button key={s} onClick={() => setWord(s)} style={{
                    background: C.cream, border: `1.5px solid ${C.ink}20`, borderRadius: 999,
                    padding: '5px 14px', fontWeight: 600, fontSize: 13, cursor: 'pointer',
                    fontFamily: 'inherit', color: C.ink }}>{s}</button>
                ))}
              </div>
              <button className="soh-pill-btn" onClick={() => setEditing(false)} disabled={isEmpty}
                style={{ background: isEmpty ? C.cream : C.coral, color: isEmpty ? C.inkSoft : 'white',
                  cursor: isEmpty ? 'not-allowed' : 'pointer', fontSize: 14 }}>
                <IconCheck size={14} /> {isEmpty ? 'Pick or type a word' : "Let's go"}
              </button>
            </div>
          ) : (
            <div className="soh-pop">
              <OneLineRainbowTitle word={themeWord} />
            </div>
          )}

          {!editing && !isEmpty && (
            <button onClick={() => setEditing(true)} style={{ marginTop: 16, background: 'transparent',
              border: 'none', color: C.inkSoft, fontWeight: 600, fontSize: 13, cursor: 'pointer',
              fontFamily: 'inherit', display: 'inline-flex', alignItems: 'center', gap: 4 }}>
              <IconEdit size={12} /> change theme
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function OneLineRainbowTitle({ word }) {
  // Two-line approach: "SUMMER OF" on top, word on bottom — guarantees the word
  // never breaks across lines, no matter how long it is.
  const top = 'SUMMER OF';
  const bottom = (word || '').toUpperCase();

  // Smart font sizing for the bottom word based on character count
  // Short words (3-4 letters): big. Long words (8+): scale down.
  const len = bottom.length;
  const bottomSize = len <= 4 ? 'clamp(56px, 12vw, 110px)'
    : len <= 6 ? 'clamp(48px, 10vw, 96px)'
    : len <= 8 ? 'clamp(40px, 8vw, 80px)'
    : len <= 10 ? 'clamp(34px, 6.5vw, 68px)'
    : 'clamp(28px, 5vw, 56px)';

  const renderRainbow = (text, fontSize) => (
    <div style={{
      fontFamily: '"Tutti Frutti", "Fraunces", serif',
      fontSize,
      fontWeight: 900,
      lineHeight: 1,
      letterSpacing: '-0.01em',
      whiteSpace: 'nowrap',
    }}>
      {text.split('').map((ch, i) => {
        if (ch === ' ') return <span key={i}>&nbsp;</span>;
        const color = LETTER_COLORS[i % LETTER_COLORS.length];
        return (
          <span key={i} style={{
            color,
            display: 'inline-block',
            transform: `translateY(${i % 2 === 0 ? '-2px' : '2px'}) rotate(${i % 3 === 0 ? '-2deg' : (i % 3 === 1 ? '1deg' : '0deg')})`,
          }}>
            {ch}
          </span>
        );
      })}
    </div>
  );

  return (
    <div>
      {renderRainbow(top, 'clamp(28px, 5.5vw, 56px)')}
      <div style={{ marginTop: 8 }}>
        {renderRainbow(bottom, bottomSize)}
      </div>
    </div>
  );
}

function RainbowWord({ text, sizeClamp }) {
  return (
    <span style={{ display: 'inline-block', fontFamily: '"Tutti Frutti", "Fraunces", serif',
      fontWeight: 900, fontSize: sizeClamp, lineHeight: 0.95, letterSpacing: '-0.01em' }}>
      {text.split('').map((ch, i) => {
        if (ch === ' ') return <span key={i}>&nbsp;</span>;
        return (
          <span key={i} style={{ color: LETTER_COLORS[i % LETTER_COLORS.length],
            display: 'inline-block', transform: `translateY(${i % 2 === 0 ? '-2px' : '1px'})` }}>
            {ch}
          </span>
        );
      })}
    </span>
  );
}

// DUE DATE PICKER
// ═══════════════════════════════════════════════════════════════════
function DueDatePicker({ value, endDate, onChange }) {
  const isCustom = value && value !== 'end';
  const [mode, setMode] = useState(value === 'end' ? 'end' : (isCustom ? 'custom' : 'none'));
  useEffect(() => {
    if (value === 'end') setMode('end');
    else if (value && value !== 'end') setMode('custom');
    else setMode('none');
  }, [value]);
  return (
    <div style={{ display: 'flex', gap: 4 }}>
      <select className="soh-input" value={mode} onChange={e => {
        const v = e.target.value; setMode(v);
        if (v === 'none') onChange(''); else if (v === 'end') onChange('end');
      }} style={{ cursor: 'pointer', minWidth: 0, padding: '10px 8px' }}>
        <option value="none">No due date</option>
        <option value="end">By end of summer</option>
        <option value="custom">Pick a date</option>
      </select>
      {mode === 'custom' && (
        <input type="date" className="soh-input" value={isCustom ? value : ''}
          onChange={e => onChange(e.target.value)} max={endDate}
          style={{ padding: '10px 8px' }} />
      )}
    </div>
  );
}

function DueDateLabel({ due, done, endDate, inline }) {
  if (!due) return null;
  const isEnd = due === 'end';
  const text = isEnd ? 'by end of summer' : prettyDate(due);
  const now = new Date(); now.setHours(0,0,0,0);
  const target = isEnd ? parseDate(endDate) : parseDate(due);
  const overdue = target && !done && now > target;
  const soon = target && !done && !overdue && daysBetween(new Date(now), new Date(target)) <= 3;
  const color = done ? C.sage : overdue ? C.coral : soon ? C.mustard : C.inkSoft;
  return (
    <span style={{ fontSize: 11, fontWeight: 700, color,
      display: 'inline-flex', alignItems: 'center', gap: 4,
      marginTop: inline ? 0 : 2 }}>
      <IconClock size={11} /> {text}{overdue ? ' (overdue)' : ''}
    </span>
  );
}

// ─── Day view: today's tasks per family member, collapsed by default ───
function DayView({ selectedDate, setSelectedDate, family, responsibilities, eventsByDate, bumpResp }) {
  const [expandedIds, setExpandedIds] = useState(new Set()); // member IDs that are expanded
  const dateObj = parseDate(selectedDate);
  const todayIso = formatISO(new Date());
  const isToday = selectedDate === todayIso;

  const goPrev = () => {
    const d = parseDate(selectedDate); d.setDate(d.getDate() - 1);
    setSelectedDate(formatISO(d));
  };
  const goNext = () => {
    const d = parseDate(selectedDate); d.setDate(d.getDate() + 1);
    setSelectedDate(formatISO(d));
  };
  const goToday = () => setSelectedDate(todayIso);

  const toggleMember = (id) => {
    setExpandedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  // For each family member: figure out what's "scheduled" for this day
  // (recurring daily/weekly tasks show up every applicable day; one-time once if not done)
  const tasksForMember = (memberId) => {
    const myResp = responsibilities.filter(c => c.memberId === memberId);
    const tasks = [];
    myResp.forEach(c => {
      // Has this task been done on this specific day?
      const doneToday = (c.log || []).some(d => d === selectedDate);
      // Show it if: it's daily/weekly (always shows), monthly (always shows), or one-time and not done yet
      if (c.frequency === 'daily1' || c.frequency === 'daily2' ||
          c.frequency === 'weekly' || c.frequency === 'monthly') {
        tasks.push({ id: c.id, text: c.text, frequency: c.frequency,
          doneToday, completions: c.completions || 0 });
      } else if (c.frequency === 'once') {
        // Only show one-time if not yet done at all
        if ((c.completions || 0) < 1) {
          tasks.push({ id: c.id, text: c.text, frequency: c.frequency,
            doneToday: false, completions: 0 });
        }
      }
    });
    return tasks;
  };

  const eventsToday = eventsByDate[selectedDate] || [];

  const friendlyDate = dateObj
    ? dateObj.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' })
    : '';

  return (
    <div>
      {/* Date navigator */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        gap: 12, marginBottom: 18, flexWrap: 'wrap' }}>
        <button onClick={goPrev} style={{
          background: C.cream, border: 'none', borderRadius: 999, padding: '6px 14px',
          fontWeight: 700, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit', color: C.ink,
        }}>← Prev</button>

        <div style={{ textAlign: 'center', flex: 1 }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em',
            textTransform: 'uppercase', opacity: 0.55 }}>{isToday ? 'today' : 'date'}</div>
          <div style={{ fontFamily: '"Tutti Frutti", "Fraunces", serif', fontSize: 20, fontWeight: 700,
            color: isToday ? C.coral : C.ink }}>{friendlyDate}</div>
          {!isToday && (
            <button onClick={goToday} style={{
              background: 'transparent', border: 'none', cursor: 'pointer',
              color: C.coral, fontSize: 12, fontWeight: 700, fontFamily: 'inherit',
              textDecoration: 'underline', marginTop: 2,
            }}>Jump to today</button>
          )}
        </div>

        <button onClick={goNext} style={{
          background: C.cream, border: 'none', borderRadius: 999, padding: '6px 14px',
          fontWeight: 700, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit', color: C.ink,
        }}>Next →</button>
      </div>

      {/* Events for the day (tight summary, not expanded) */}
      {eventsToday.length > 0 && (
        <div style={{ background: C.cream, borderRadius: 12, padding: 12, marginBottom: 14 }}>
          <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: '0.1em',
            textTransform: 'uppercase', opacity: 0.55, marginBottom: 6 }}>
            📅 on the calendar today
          </div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {eventsToday.map((e, i) => (
              <span key={i} style={{
                display: 'inline-flex', alignItems: 'center', gap: 6,
                background: e.color, color: 'white',
                padding: '4px 10px', borderRadius: 999,
                fontSize: 12, fontWeight: 700,
              }}>{e.title}</span>
            ))}
          </div>
        </div>
      )}

      {/* Per-member task cards (collapsed by default) */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {family.map(member => {
          const tasks = tasksForMember(member.id);
          const doneCount = tasks.filter(t => t.doneToday).length;
          const isExpanded = expandedIds.has(member.id);

          return (
            <div key={member.id} style={{
              background: C.paper,
              borderRadius: 14,
              border: `2px solid ${doneCount === tasks.length && tasks.length > 0 ? member.color : C.ink + '10'}`,
              overflow: 'hidden',
              transition: 'border-color 0.2s ease',
            }}>
              <button onClick={() => toggleMember(member.id)} style={{
                width: '100%', background: 'transparent', border: 'none', cursor: 'pointer',
                padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 12,
                fontFamily: 'inherit', color: C.ink,
              }}>
                <div style={{
                  width: 36, height: 36, borderRadius: '50%', background: member.color,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 18, flexShrink: 0,
                }}>{member.emoji}</div>
                <div style={{ flex: 1, textAlign: 'left' }}>
                  <div style={{ fontFamily: '"Tutti Frutti", "Fraunces", serif', fontSize: 17, fontWeight: 700 }}>
                    {member.name}
                  </div>
                  <div style={{ fontSize: 12, opacity: 0.7, fontWeight: 600 }}>
                    {tasks.length === 0
                      ? 'No tasks today'
                      : doneCount === tasks.length
                        ? `🎉 All ${tasks.length} done!`
                        : `${doneCount} of ${tasks.length} done`}
                  </div>
                </div>
                {tasks.length > 0 && (
                  <IconChevron open={isExpanded} size={16} />
                )}
              </button>

              {isExpanded && tasks.length > 0 && (
                <div style={{ padding: '0 16px 14px', display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {tasks.map(t => {
                    const freqDef = FREQUENCIES.find(f => f.id === t.frequency);
                    return (
                      <div key={t.id} style={{
                        display: 'flex', alignItems: 'center', gap: 10,
                        padding: '8px 10px', background: C.cream, borderRadius: 10,
                      }}>
                        <SoftCheckbox
                          checked={t.doneToday}
                          onClick={() => bumpResp(t.id, t.doneToday ? -1 : 1, selectedDate)}
                          color={member.color} />
                        <span style={{
                          flex: 1, fontSize: 14, fontWeight: 500,
                          textDecoration: t.doneToday ? 'line-through' : 'none',
                          opacity: t.doneToday ? 0.55 : 1,
                        }}>
                          {t.text}
                        </span>
                        <span style={{
                          fontSize: 10, fontWeight: 700, opacity: 0.55,
                          background: `${member.color}20`, color: C.ink,
                          padding: '2px 8px', borderRadius: 999,
                        }}>{freqDef?.label || t.frequency}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {family.every(m => tasksForMember(m.id).length === 0) && eventsToday.length === 0 && (
        <div style={{ textAlign: 'center', padding: '24px 16px', opacity: 0.55,
          fontSize: 14, fontWeight: 500 }}>
          Nothing scheduled today. Enjoy a slow day! 🌼
        </div>
      )}
    </div>
  );
}

function WeekView({ eventsByDate, removeEvent }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const monday = startOfWeek(today);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    days.push(d);
  }
  return (
    <div style={{ overflowX: 'auto', WebkitOverflowScrolling: 'touch' }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, minmax(90px, 1fr))', gap: 8, minWidth: '100%' }}>
      {days.map((d, i) => {
        const iso = formatISO(d);
        const dayEvents = eventsByDate[iso] || [];
        const isToday = formatISO(today) === iso;
        return (
          <div key={i} style={{
            background: isToday ? `${C.coral}15` : C.cream, borderRadius: 12, padding: 10,
            border: isToday ? `2px solid ${C.coral}` : '2px solid transparent',
            minHeight: 110,
          }}>
            <div style={{ fontSize: 10, fontWeight: 700, opacity: 0.5, letterSpacing: '0.05em' }}>
              {d.toLocaleDateString(undefined, { weekday: 'short' }).toUpperCase()}
            </div>
            <div style={{ fontSize: 20, fontWeight: 800, fontFamily: '"Tutti Frutti", "Fraunces", serif',
              color: isToday ? C.coral : C.ink, marginBottom: 6 }}>
              {d.getDate()}
            </div>

function FullMonth({ year, month, eventsByDate, removeEvent }) {
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const daysInMonth = lastDay.getDate();
  const firstWeekday = (firstDay.getDay() + 6) % 7;
  const cells = [];
  for (let i = 0; i < firstWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  const today = new Date();

  return (
    <div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4, marginBottom: 6 }}>
        {['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d, i) => (

            opacity: 0.5, letterSpacing: '0.05em' }}>{d}</div>
        ))}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4 }}>
        {cells.map((day, idx) => {
          if (!day) return <div key={idx} style={{ minHeight: 80 }} />;
          const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
          const dayEvents = eventsByDate[dateStr] || [];
          const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
          return (
            <div key={idx} style={{
              minHeight: 80, padding: 6,
              background: isToday ? `${C.coral}15` : C.cream,
              border: isToday ? `2px solid ${C.coral}` : '2px solid transparent',
              borderRadius: 8,
            }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 4,
                color: isToday ? C.coral : C.ink }}>{day}</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                {dayEvents.slice(0, 3).map((e, i) => (
                  <div key={i} style={{
                    fontSize: 9, fontWeight: 600, padding: '1px 4px',
                    background: e.color, color: 'white', borderRadius: 3,
                    whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                  }} title={e.title}>{e.title}</div>
                ))}
                {dayEvents.length > 3 && (
                  <div style={{ fontSize: 9, opacity: 0.6, fontWeight: 700 }}>+{dayEvents.length - 3} more</div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
