// LOGIN SCREEN — email-based "login" (email is the storage key)
// ═══════════════════════════════════════════════════════════════════
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [rememberedEmail, setRememberedEmail] = useState('');
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);
  const [errorMsg, setErrorMsg] = useState('');

  useEffect(() => {
    try {
      const saved = window.localStorage.getItem('soh-remembered-email');
      if (saved) {
        setEmail(saved);
        setRememberedEmail(saved);
      }
    } catch (e) {}
  }, []);

  const submit = async (e) => {
    if (e) e.preventDefault();
    const clean = email.trim().toLowerCase();
    if (!clean) return;
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(clean)) {
      setErrorMsg('Please enter a valid email address.');
      return;
    }
    setErrorMsg('');
    setSending(true);
    try {
      const { error } = await sb.auth.signInWithOtp({
        email: clean,
        options: { emailRedirectTo: window.location.href.split('#')[0].split('?')[0] }
      });
      if (error) {
        setErrorMsg(error.message || 'Could not send link. Try again in a moment.');
        setSending(false);
        return;
      }
      // Remember this email for next visit
      try { window.localStorage.setItem('soh-remembered-email', clean); } catch (e) {}
      setSent(true);
    } catch (err) {
      setErrorMsg('Could not send link. Check your internet and try again.');
    }
    setSending(false);
  };

  // Rainbow renderer for the welcome heading
  const rainbowText = (text, size) => (
    <span style={{
      display: 'inline-block', fontFamily: '"Tutti Frutti", "Fraunces", serif',
      fontWeight: 900, fontSize: size, lineHeight: 1, letterSpacing: '-0.01em',
    }}>
      {text.split('').map((ch, i) => {
        if (ch === ' ') return <span key={i}>&nbsp;</span>;
        return (
          <span key={i} style={{
            color: LETTER_COLORS[i % LETTER_COLORS.length],
            display: 'inline-block',
            transform: `translateY(${i % 2 === 0 ? '-2px' : '1px'}) rotate(${i % 3 === 0 ? '-2deg' : (i % 3 === 1 ? '1deg' : '0deg')})`,
          }}>
            {ch}
          </span>
        );
      })}
    </span>
  );

  return (
    <div style={{
      background: C.cream, color: C.ink, minHeight: '100vh',
      padding: '40px 16px 80px', position: 'relative', overflow: 'hidden',
      borderRadius: 16,
      fontFamily: '"Quicksand", sans-serif',
    }}>
      <style>{`
        @keyframes soh-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .soh-fade { animation: soh-fade 0.4s ease-out; }
      `}</style>

      <div className="soh-fade" style={{ maxWidth: 560, margin: '40px auto', textAlign: 'center', position: 'relative' }}>
        <DecorSticker style={{ top: 0, left: '10%' }} rotate={-15} size={32}><Sparkle color={C.mustard} /></DecorSticker>
        <DecorSticker style={{ top: 30, right: '12%' }} rotate={18} size={28}><Sparkle color={C.coral} /></DecorSticker>
        <DecorSticker style={{ top: 240, left: '8%' }} rotate={-8} size={20}><Dot color={C.sage} /></DecorSticker>
        <DecorSticker style={{ top: 280, right: '14%' }} rotate={10} size={24}><Dot color={C.dustyblue} /></DecorSticker>

        <div style={{
          position: 'relative', display: 'inline-block', maxWidth: '95%',
          background: C.paper, borderRadius: 32, padding: 'clamp(24px, 5vw, 40px) clamp(20px, 5vw, 40px) 32px',
          boxShadow: `0 8px 24px ${C.ink}15, 0 2px 0 ${C.ink}10`,
        }}>
          <div style={{
            display: 'inline-block', background: C.coral, color: 'white',
            padding: '4px 14px', borderRadius: 4, fontFamily: '"Tutti Frutti", "Fraunces", serif',
            fontSize: 13, fontWeight: 700, letterSpacing: '0.15em', textTransform: 'uppercase',
            transform: 'rotate(-2deg)', marginBottom: 24, boxShadow: `2px 2px 0 ${C.ink}10`,
          }}>
            family dashboard
          </div>

          <h1 style={{ margin: 0, lineHeight: 1.05 }}>
            {rememberedEmail ? (
              <React.Fragment>
                {rainbowText('WELCOME', 'clamp(36px, 7vw, 64px)')}
                <br />
                {rainbowText('BACK!', 'clamp(36px, 7vw, 64px)')}
              </React.Fragment>
            ) : (
              rainbowText('WELCOME!', 'clamp(40px, 9vw, 72px)')
            )}
          </h1>

          <p style={{ marginTop: 24, fontSize: 16, lineHeight: 1.6, color: C.ink, opacity: 0.85, maxWidth: 440 }}>
            {sent
              ? "We just sent you a link. Open your email on this device, click the link, and you're in."
              : rememberedEmail
                ? 'Tap to send yourself a fresh sign-in link.'
                : 'Enter your email — we\'ll send you a link to sign in. No password to remember.'}
          </p>

          {sent ? (
            <div style={{ marginTop: 28 }}>
              <div style={{
                padding: '18px 20px', borderRadius: 14,
                background: `${C.sage}22`, border: `2px solid ${C.sage}55`,
                color: C.ink, fontWeight: 600, fontSize: 15,
              }}>
                ✉️ Link sent to <strong style={{ color: C.coral }}>{email}</strong>
              </div>
              <p style={{ marginTop: 18, fontSize: 13, lineHeight: 1.6, color: C.ink, opacity: 0.7 }}>
                Can't find it? Check your spam folder. The link works for one hour.
              </p>
              <button onClick={() => { setSent(false); setErrorMsg(''); }} style={{
                marginTop: 14, background: 'transparent', border: 'none',
                color: C.coral, fontWeight: 700, fontSize: 14, cursor: 'pointer',
                fontFamily: 'inherit', textDecoration: 'underline',
              }}>
                Use a different email
              </button>
            </div>
          ) : (
            <form onSubmit={submit} style={{ marginTop: 28, display: 'flex', flexDirection: 'column', gap: 12 }}>
              <input type="email" value={email} onChange={e => { setEmail(e.target.value); setErrorMsg(''); }}
                placeholder="your.email@example.com" autoFocus disabled={sending}
                style={{
                  padding: '14px 18px', borderRadius: 14,
                  border: `2px solid ${errorMsg ? C.coral : C.ink + '15'}`, background: C.paper,
                  fontSize: 16, color: C.ink, outline: 'none',
                  fontFamily: 'inherit', fontWeight: 600, textAlign: 'center',
                  transition: 'border-color 0.15s ease',
                  opacity: sending ? 0.6 : 1,
                }}
                onFocus={e => { if (!errorMsg) e.target.style.borderColor = C.coral; }}
                onBlur={e => { if (!errorMsg) e.target.style.borderColor = `${C.ink}15`; }} />

              {errorMsg && (
                <p style={{ margin: 0, fontSize: 13, color: C.coral, fontWeight: 600, textAlign: 'center' }}>
                  {errorMsg}
                </p>
              )}

              <button type="submit" disabled={!email.trim() || sending} style={{
                padding: '14px 28px', borderRadius: 999, border: 'none',
                background: email.trim() && !sending ? C.coral : C.cream,
                color: email.trim() && !sending ? 'white' : C.inkSoft,
                fontFamily: 'inherit', fontWeight: 700, fontSize: 16,
                cursor: email.trim() && !sending ? 'pointer' : 'not-allowed',
                boxShadow: email.trim() && !sending ? `0 4px 0 ${C.ink}20` : 'none',
                transition: 'transform 0.12s ease',
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
              }}
                onMouseEnter={e => { if (email.trim() && !sending) e.currentTarget.style.transform = 'translateY(-1px)'; }}
                onMouseLeave={e => e.currentTarget.style.transform = 'translateY(0)'}>
                {sending ? 'Sending…' : (rememberedEmail ? "Send me a link →" : "Send me a link →")}
              </button>
            </form>
          )}

          <p style={{ marginTop: 22, fontSize: 12, lineHeight: 1.5, color: C.ink, opacity: 0.55, maxWidth: 400, marginLeft: 'auto', marginRight: 'auto' }}>
            ✨ No password needed — we email you a one-tap sign-in link. Saves automatically as you go.
          </p>

          {/* DEMO MODE — for testing & previewing the full product */}
          <div style={{ marginTop: 28, paddingTop: 20, borderTop: `1px dashed ${C.ink}15` }}>
            <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.1em',
              textTransform: 'uppercase', opacity: 0.55, marginBottom: 10 }}>
              just browsing?
            </p>
            <button onClick={() => onLogin('demo@summerofhappy.com', { demo: true })}
              style={{
                background: C.cream, color: C.ink,
                border: `1.5px dashed ${C.ink}25`, borderRadius: 999,
                padding: '8px 18px', fontWeight: 700, fontSize: 13,
                cursor: 'pointer', fontFamily: 'inherit',
                display: 'inline-flex', alignItems: 'center', gap: 6,
              }}>
              🎨 Try a demo with sample data
            </button>
            <p style={{ fontSize: 11, lineHeight: 1.4, color: C.ink, opacity: 0.45,
              maxWidth: 380, marginLeft: 'auto', marginRight: 'auto', marginTop: 10 }}>
              Loads a sample family (Mom, Dad, Mary Grace, Caden, Sadie) so you can see
              exactly how the dashboard works. Your real email is safe.
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}
